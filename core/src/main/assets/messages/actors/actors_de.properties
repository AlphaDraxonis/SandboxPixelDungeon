actors.mobs.npcs.shopkeeper.talk=Unterhalten
actors.mobs.npcs.shopkeeper.buyback=Der Ladenbesitzer gibt dir den Gegenstand widerwillig zurÃỳck.
actors.mobs.npcs.shopkeeper.talk_prison_intro=Ich habe alles, was Du fÃỳr ein erfolgreiches Abenteuer brauchst!
actors.mobs.npcs.shopkeeper.talk_prison_warrior=Das ist ein interessantes Siegel, das Du da hast. Die gibt es normalerweise nur im Ganzen. Bist Du ein in Ungnade gefallener Held oder sowas? Na, wie auch immer, was Du getan hast, ist nicht mein Problem, und es ÃĊndert nichts am Wert Deiner MÃỳnzen.
actors.mobs.npcs.shopkeeper.talk_prison_mage=Hehe, ich glaube, ich habe einen Steckbrief mit Deinem Namen irgendwo in der Stadt gesehen. Auf der Flucht, wie? Ach, Du bist unschuldig? Klar, logisch... keine Sorge, ich habe besseres zu tun, als Dich zu verpfeifen, aber vielleicht solltest Du mir sicherheitshalber etwas abkaufen?
actors.mobs.npcs.shopkeeper.talk_prison_rogue=Kommst Du von der Diebesgilde, um die Gegend leerzurÃĊumen? Nein, nur einkaufen? Gut, erledige ein paar Monster, wenn Du schonmal da bist. Aber erwarte keinen Rabatt, ich bezahle schon genug Schutzgeld an euch Leute, dabei sorgt ihr hier unten kaum fÃỳr meine Sicherheit.
actors.mobs.npcs.shopkeeper.talk_prison_huntress=Du scheinst nicht gerade in deinem Element zu sein, Miss. Enge DungeongÃĊnge sind nicht so weitlÃĊufig wie groÃe Hallen oder die WÃĊlder, die die Stadt umgeben, nicht wahr? Ach, lass dich von meinem Geschwafel nicht ÃĊrgern. MÃ¶chtest Du vielleicht etwas kaufen?
actors.mobs.npcs.shopkeeper.talk_prison_duelist=Na, wenn das mal nicht die reisende Heldin ist! Wenn Du versuchst, mal wieder eine Stadt zu retten, dann viel GlÃỳck. Die Gefahren hier sind nÃĊmlich wesentlich schlimmer als ein paar lÃĊppische Gaunerbanden. Ich bin sicher, Du schlÃĊgst Dich besser als jede andere, nur versuche bitte, nicht direkt vor meiner LadentÃỳr zu sterben.
actors.mobs.npcs.shopkeeper.talk_prison_cleric=Nun, ich grÃỳÃe Dich, HochwÃỳrden, oder ist es inzwischen Eure Heiligkeit? Hehe, wie dem auch sei, das hier ist kein Ort fÃỳr Dich, und eine Menge an Leute wÃĊre sicher ziemlich bestÃỳrzt, wenn Du plÃ¶tzlich tot sein solltest. Aber sicher hast Du ein paar GeldstÃỳcke dabei, warum kaufst Du also nicht etwas, um das zu vermeiden?
actors.mobs.npcs.shopkeeper.talk_caves=Gib Geld aus, lebe lÃĊnger.\n\nOh, und grÃỳÃe den Trollschmied von mir, wenn Du ihn siehst. Erinnere das Schlitzohr an das Geld, das er mir immer noch fÃỳr den Hammer schuldet, den ich ihm letzte Woche verkauft habe.
actors.mobs.npcs.shopkeeper.talk_city=Meine Waren kÃ¶nnen Dich hier unten schÃỳtzen.\n\n... und trÃ¶del bitte nicht herum. Es hat ewig gedauert, die Bewohner hier dazu zu bringen, mich in Ruhe zu lassen. Ich will nicht, dass Du mir irgendwelchen Ãrger verursachst.
actors.mobs.npcs.shopkeeper.talk_halls=Hey, ich hab Sonderangebote fÃỳr DÃĊmonenjÃĊger!\n\nOh, und sei vorsichtig dort unten. Die DÃĊmonen kÃỳmmern sich nicht darum, wie mutig du bist. Du kannst nicht zurÃỳckkommen und mehr Geld ausgeben, wenn du tot bist! ;)\n\nOb die DÃĊmonen sind wie ich? Ha, nicht im geringsten. Ich bin nur ein gewÃ¶hnlicher Bursche, nicht gerade ein KÃĊmpfer, und ich hab's geschafft, meinen Verstand intakt zu halten. Die DÃĊmonen unten sind wesentlich stÃĊrkere Wesen, und sie alle wurden versklavt von... naja... sei einfach vorsichtig dort unten.
actors.mobs.npcs.shopkeeper.talk_ascent=Ich weiÃ nicht, was Du mit diesem Amulett vorhast, aber ich will nichts damit zu tun haben. Kauf irgendwas und zieh weiter, wir mÃỳssen beide hier weg!
actors.mobs.npcs.shopkeeper.desc=Dieser stÃĊmmige Typ wÃỳrde von seinem Erscheinungsbild her eher ins Handelsviertel einer grÃ¶Ãeren Stadt passen als in ein Dungeon. Seine Preise erklÃĊren aber, warum er den Handel hier bevorzugt.

actors.mobs.npcs.wandmaker.name=Alter Stabmacher
actors.mobs.npcs.wandmaker.intro_warrior=Oh, sei gegrÃỳÃt! Welch eine angenehme Ãberraschung, einen Krieger aus dem Norden an diesem deprimierenden Ort anzutreffen! Du musst weit gereist sein, bevor du hierhergekommen bist. Wenn du auf Abenteuer aus bist, hÃĊtte ich vielleicht eine Aufgabe fÃỳr dich.
actors.mobs.npcs.wandmaker.intro_rogue=Du meine GÃỳte, hast du mich erschreckt! Ich habe keinen Banditen an diesem Ort entdeckt, der immer noch bei Verstand wÃĊre, also musst du von der OberflÃĊche sein! Wenn du Interesse hast, einem Fremden zu helfen, hÃĊtte ich eine Aufgabe fÃỳr dich.
actors.mobs.npcs.wandmaker.intro_mage=Oh, Hallo %s! Ich habe mitbekommen, dass da wohl etwas Unruhe zwischen dir und dem Institut der Zauberer herrschte? Vergiss es, ich war niemals ein Freund dieser Engstirnigen. Wenn du mÃ¶chtest, hÃĊtte ich eine Aufgabe fÃỳr dich.
actors.mobs.npcs.wandmaker.intro_huntress=Oh, hallo, meine Dame! Ein freundliches Gesicht hier in dieser Tiefe zu entdecken ist wahrlich eine erfreuliche Ãberraschung, oder? TatsÃĊchlich kommt mir dein Gesicht bekannt vor. Es liegt mir auf der Zunge... Wie dem auch sei, falls du hier auf Abenteuer aus bist, hÃĊtte ich vielleicht eine Aufgabe fÃỳr dich.
actors.mobs.npcs.wandmaker.intro_duelist=Oh, hallo, meine Dame! Welch angenehme Ãberraschung, in dieser deprimierenden Umgebung einer Heldin zu begegnen! Wenn Du gewillt wÃĊrest, einem alten Mann zu helfen, hÃĊtte ich eine Aufgabe fÃỳr Dich.
actors.mobs.npcs.wandmaker.intro_cleric=Oh, hallo, Eure Heiligkeit! Welch eine freudige Ãberraschung, Dich an einem solch bedrÃỳckenden Ort zu treffen. Ich mag es nicht, jemandem etwas aufzubÃỳrden, aber ich hÃĊtte da wahrscheinlich eine Aufgabe fÃỳr Dich.
actors.mobs.npcs.wandmaker.intro_1=\n\nIch bin hier, um eine seltene Zutat fÃỳr einen Zauberstab zu finden, doch habe ich mich verlaufen und mein magischer Schutzschild ist geschwÃĊcht. Ich muss diesen Ort bald verlassen, doch ich kann den Gedanken nicht ertragen, ihm mit leeren HÃĊnden den RÃỳcken zu kehren.
actors.mobs.npcs.wandmaker.intro_dust=Ich suche nach etwas _Leichenstaub._ Das ist eine besondere Art verfluchtes Gebein, das normalerweise an Orten wie diesem zu finden ist. Hier mÃỳsste irgendwo ein verbarrikadierter Raum sein, ich wette, da gibt es solchen Staub. Sei aber vorsichtig, der Fluch auf diesem Staub ist ziemlich mÃĊchtig, also _komm so schnell wie mÃ¶glich zurÃỳck,_ damit ich den Staub reinigen kann.
actors.mobs.npcs.wandmaker.intro_ember=Ich suche nach etwas _frischer Asche_ von einem neugeborenen Feuerelementar. Elementare erscheinen normalerweise, wenn ein BeschwÃ¶rungsritual auÃer Kontrolle gerÃĊt, also suche einfach ein paar Kerzen und einen Ritualplatz. Ich bin mir sicher, dass Du eins auftauchen lassen kannst. Pass jedoch auf, dass Du Dir beim Kampf _nicht Deine RÃỳckzugsmÃ¶glichkeiten nimmst,_ oder halte _etwas bereit, das Frost erzeugen kann._ Neugeborene Elementare sind recht stark und chaotisch, aber KÃĊlte kÃ¶nnen sie nicht leiden.
actors.mobs.npcs.wandmaker.intro_berry=Die frÃỳhere WÃĊrterin dieses GefÃĊngnisses zÃỳchtete hier eine _Faulbeere_ und ich brauche die Samen dieser Pflanze. Die Pflanze muss inzwischen auÃer Rand und Band sein, daher benÃ¶tigt diese Aufgabe etwas FingerspitzengefÃỳhl. Der Garten sollte sich hier irgendwo in der NÃĊhe befinden. Versuche _Abstand von den Ranken zu gewinnen,_ wenn du nicht in kleine StÃỳckchen geschnitten werden mÃ¶chtest. Alles in Brand zu setzen wirkt verlockend, aber ich bitte dich das zu vermeiden, da es die gesamte Pflanze und ihre Samen vernichtet.
actors.mobs.npcs.wandmaker.intro_2=\n\nWenn du mir das besorgen kannst, werde ich dich mit einem meiner ausgezeichneten ZauberstÃĊbe belohnen. Ich habe zwei mitgebracht, daher darfst du dir einen aussuchen und behalten.
actors.mobs.npcs.wandmaker.reminder_dust=Hast du Leichenstaub gefunden, %s? Suche nach verbarrikadierten RÃĊumen.
actors.mobs.npcs.wandmaker.reminder_ember=Hast du diese Asche gefunden, %s? Du brauchst vier Kerzen und einen Ritualplatz.
actors.mobs.npcs.wandmaker.reminder_berry=Hast du einen FÃĊulnissamen gefunden, %s? Suche nach einem Raum, der vollstÃĊndig zugewuchert ist.
actors.mobs.npcs.wandmaker.def_verb=geblockt
actors.mobs.npcs.wandmaker.desc=Dieser alte, aber noch rÃỳstige Herr blickt leicht verwirrt. Er wird beschÃỳtzt von einem magischen Schutzschild.



###mobs
actors.mobs.acidic.name=ÃĊtzender Skorpion
actors.mobs.acidic.desc=Diese riesigen, spinnenartigen DÃĊmonenkreaturen vermeiden den Nahkampf, sie ziehen es vor, verkrÃỳppelnde, zahnbesetzte Stacheln aus weiter Entfernung zu schieÃen. Diese hier trieft vor zersetzendem Schlamm.

actors.mobs.albino.name=Albinoratte
actors.mobs.albino.desc=Dies ist eine seltene Gattung der Ratte, erkennbar an ihrem weiÃen Fell und ihren gezackten ZÃĊhnen.
actors.mobs.albino.discover_hint=Du findest diesen seltenen Gegner in einer bestimmten Region im Dungeon.

actors.mobs.armoredstatue.name=gepanzerte Statue
actors.mobs.armoredstatue.desc=WÃĊren da nicht diese beunruhigend rot leuchtenden Augen, kÃ¶nnte man annehmen, es handle sich nur um eine weitere Skulptur in diesem Dungeon.\n\nAugenscheinlich ist sie aufgrund der RÃỳstung, die sie trÃĊgt, in hervorragender Verfassung; es kÃ¶nnte sehr schwer werden, sie zu besiegen.
actors.mobs.armoredstatue.desc_arm_wep=Die Statue an sich ist aus Stein, aber _%1$s_ und _%2$s_, die sie bei sich trÃĊgt, sehen sehr echt aus.

actors.mobs.bandit.name=verrÃỳckter Bandit
actors.mobs.bandit.desc=Ein Elitedieb, der sich durch sein opulenteres lilafarbenes Gewand auszeichnet. Trotz seines grÃ¶Ãeren KÃ¶nnens ist er genauso hirnlos geworden wie normale Diebe.\n\nVerrÃỳckte Banditen bestehlen dich nicht nur, sondern blenden, verkrÃỳppeln und vergiften dich auch kurzzeitig! Allerdings ist die Wahrscheinlichkeit, dass sie zusÃĊtzliche Beute mit sich fÃỳhren, viel hÃ¶her als bei normalen Dieben.

actors.mobs.bat.name=Vampirfledermaus
actors.mobs.bat.desc=Diese flinken und hartnÃĊckigen HÃ¶hlenbewohner sind weit gefÃĊhrlicher, als es den Anschein hat. Durch jeden erfolgreichen Angriff gewinnen sie Lebensenergie, wodurch sie in der Lage sind, weit grÃ¶Ãere Gegner zu besiegen.

actors.mobs.bee.name=goldene Biene
