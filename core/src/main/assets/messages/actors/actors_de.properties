actors.mobs.causticslime.name=ÃĊtzender Schleim
actors.mobs.causticslime.desc=Dieser Schleim scheint von der dunklen Magie, welche von der Tiefe ausgeht, verdorben worden zu sein. Er hat seine normale grÃỳne Farbe verloren und ÃĊtzender Schlamm tropft von ihm herunter.
