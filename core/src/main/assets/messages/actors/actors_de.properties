actors.mobs.eye.desc=Ãble Augen sind schwebende BÃĊlle aufgestauter dÃĊmonischer Energie. Sie besitzen NahkampffÃĊhigkeiten, aber ihre wahre StÃĊrke zeigt sich durch ihre magischen KrÃĊfte.\n\nNachdem sie kurz Energie aufbauen verschieÃt ein Ãbles Auge einen verheerenden Energiestrahl, welcher _Todesblick_ genannt wird. Alles im Sichtfeld des Ãblen Auges nimmt enormen Schaden. Kluge Abenteurer nehmen hier schnell Deckung.

actors.mobs.fetidrat.name=verfaulende Ratte
actors.mobs.fetidrat.desc=Es ist offensichtlich, dass etwas mit dieser Ratte nicht stimmt. Ihr schmieriges, schwarzes Fell und die faulende Haut sind keineswegs mit den gesunden Ratten vergleichbar, welche du bisher gesehen hast. Ihre blassen, grÃỳnen Augen lassen sie besonders bedrohlich erscheinen.\n\nDie Ratte sondert eine Ãỳbelriechende Wolke ab und der Gestank macht dich benommen, wenn du nahe herankommst.\n\nDunkler Schleim tropft Ihr aus dem Mundwinkel, welcher sich durch den Boden frisst. Es scheint sich aber in Wasser aufzulÃ¶sen.
actors.mobs.fetidrat.discover_hint=Du kannst diesen Gegner wÃĊhrend einer bestimmten Aufgabe finden.

actors.mobs.fungalcore.name=Pilzkern
actors.mobs.fungalcore.desc=Dieser gigantische Pilz muss wohl die Quelle fÃỳr den Pilzbefall in dieser HÃ¶hle sein.

actors.mobs.fungalsentry.name=Pilzwache
actors.mobs.fungalsentry.desc=Dieser besonders hohe Pilz fungiert als Verteidigungsstellung fÃỳr das grÃ¶ssere, in dieser HÃ¶hle lebende Pilzgeflecht.\n\nEr ist unbeweglich, aber er schiesst prÃĊzise GiftstÃ¶sse gegen alles, was in seine Sicht gerÃĊt. Der Einschlag dieser StÃ¶sse ist recht schwach, _aber das Gift kann sich schnell zu tÃ¶dlichen Mengen summieren._ Er kann zwar getÃ¶tet werden, aber besser wÃĊre es, ihn zu meiden.

actors.mobs.fungalspinner.name=Pilzspinner
actors.mobs.fungalspinner.desc=Dieser HÃ¶hlenspinner wird von einem parasitÃĊren Pilz kontrolliert. Der Pilz hat auch seine FÃĊhigkeiten verÃĊndert; seine Spinn- und GiftdrÃỳsen wurden durch den Pilz Ãỳberwuchert.\n\nDer Pilzspinner wird dich statt mit Netzen mit GrÃỳnzeug bespucken, dadurch die Pilzsporen verbreiten und dich eventuell verwurzeln. Er kann dich nicht vergiften, aber er erreicht erhebliche Schadensresistenz, wenn er sich direkt neben einem Pilz befindet.

actors.mobs.ghoul.name=Zwergen-WiedergÃĊnger
actors.mobs.ghoul.desc=Als die Zwergengesellschaft allmÃĊhlich zusammenbrach und der jetzige ZwergenkÃ¶nig uneingeschrÃĊnkte Macht an sich riss, wurde die Schwachen und die, welche ihm widerstanden, nicht gerade fein behandelt. Als der KÃ¶nig immer besser mit der Handhabung dunkler Magie vertraut wurde, unterjochte er diese Zwerge seinem Willen, und nun bilden sie das FuÃvolk seiner Armee.\n\nWiedergÃĊnger sind fÃỳr sich genommen nicht besonders stark, aber sie bewegen sich in Gruppen und es ist sehr viel schwerer, sie zur Strecke zu bringen, wenn sie in groÃer Zahl auftreten. _Wenn ein WiedergÃĊnger besiegt wurde, wird er einige ZÃỳge spÃĊter wieder auferstehen, solange noch ein anderer WiedergÃĊnger in der NÃĊhe ist._

actors.mobs.gnoll.name=Gnoll-SpÃĊher
actors.mobs.gnoll.desc=Gnolle sind HyÃĊnen-ÃĊhnliche Humanoide. Sie hausen in der Kanalisation dieses Dungeons und wagen sich manchmal hinauf an die OberflÃĊche, um diese zu Ãỳberfallen. Gnoll-SpÃĊher sind normale Mitglieder ihres Stammes,; Sie sind nicht so stark wie Rohlinge und nicht so intelligent wie Schamanen.

actors.mobs.gnollexile.name=verbannter Gnoll
actors.mobs.gnollexile.desc=Dieser graupelzige Gnoll hat eine groÃe Markierung auf der Schulter, welche ihn als Verbannten markiert. Gnolle werden normalerweise von ihrer Gesellschaft ausgeschlossen, wenn sie Regeln ignorieren oder Gesetze brechen. Verbannte mÃỳssen stark und schlau sein, um zu Ãỳberleben. Dieser hier scheint zu wissen, wie er den Speer in seiner Hand verwenden kann.
actors.mobs.gnollexile.desc_passive=_Der verbannte Gnoll greift nicht an._ Er scheint nicht so aggressiv wie die anderen Gnolle hier zu sein, und denkt wahrscheinlich nicht, dass es sich lohnt, gegen dich zu kÃĊmpfen. Du kÃ¶nntest ihn vorbeiziehen lassen, aber er trÃĊgt einen Rucksack, der voll mit nÃỳtzlichen GegenstÃĊnden sein kÃ¶nnte...
actors.mobs.gnollexile.desc_aggro=_Der verbannte Gnoll schaut zornig um sich._ Es scheint, als hÃĊtte er sich letztendlich doch fÃỳr den Kampf entschieden. Pass auf, ein Speer!
