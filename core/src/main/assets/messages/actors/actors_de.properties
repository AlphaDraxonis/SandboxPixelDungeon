actors.mobs.elemental$fireelemental.name=Feuerelementar
actors.mobs.elemental$fireelemental.desc=Elementare sind chaotische Wesen, die hÃĊufig hervorgebracht werden, wenn starke okkulte Magie nicht richtig kontrolliert wird. Elementare haben nur geringe Intelligenz, sie sind Ãỳblicherweise mit einer bestimmten Art von Magie verbunden.\n\nFeuerelementare sind eine hÃĊufige Art von Elementaren, sie fÃỳgen durch Feuermagie Schaden zu. Im Nahkampf setzen sie ihr Ziel in Brand, und gelegentlich kÃ¶nnen sie auch FeuerschlÃĊge schieÃen.
actors.mobs.elemental$newbornfireelemental.name=neugeborenes Feuerelementar
actors.mobs.elemental$newbornfireelemental.charging=Das Elementar lÃĊdt sich auf!
actors.mobs.elemental$newbornfireelemental.desc=Elementare sind chaotische Wesen, die hÃĊufig hervorgebracht werden, wenn starke, okkulte Magie nicht richtig kontrolliert wird. Elementare haben nur geringe Intelligenz, sie sind Ãỳblicherweise mit einer bestimmten Art von Magie verbunden.\n\nDieses Feuerelementar ist frisch beschworen, aber trotzdem schon ziemlich gefÃĊhrlich!
actors.mobs.elemental$newbornfireelemental.desc_boss=Weil es so stÃỳmperhaft beschworen wurde, kann dieses Elementar Feuer erst nach einem Zug Aufladung und nur in ungenauen StÃ¶Ãen verschieÃen.
actors.mobs.elemental$newbornfireelemental.desc_ally=Da dieses Elementar durch einen Zauberspruch beschworen wurde, hat es etwas mehr Kontrolle Ãỳber seine Flamme. Es ist zu Fernangriffen nicht in der Lage, aber es kann Feinde durch Nahkampfangriffe in Flammen setzen.
