actors.buffs.terror.name=verÃĊngstigt
actors.buffs.terror.desc=Terror ist manipulative Magie, die ihr Ziel zu einer unkontrollierten Panik zwingt.\n\nTerrorisierte Charakter werden gezwungen, vor ihrem Feind ReiÃaus zu nehmen und zu versuchen, so viele TÃỳren und WÃĊnde wie mÃ¶glich zwischen sich und den Feind zu bringen. Allerdings verringert der Schock durch Schmerz die Dauer des Terrors.\n\nVerbleibende ZÃỳge mit Terror: %s.

actors.buffs.toxicimbue.name=eins mit dem Gift
