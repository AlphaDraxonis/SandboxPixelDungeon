actors.mobs.npcs.prismaticimage.name=Lichtbrechung
actors.mobs.npcs.prismaticimage.desc=Diese glitzernde Illusion sieht dir sehr ÃĊhnlich, sie scheint sogar deine derzeitige Waffe und RÃỳstung zu tragen.\n\nPrismatische Abbilder versuchen, die Aufmerksamkeit der Feinde auf sich zu lenken und setzen ihre verbesserte Verteidigung und Gesundheit dazu ein, dich zu schÃỳtzen. Sie verfÃỳgen zwar nicht Ãỳber die gleiche Schlagkraft wie Spiegelbilder, so aber doch Ãỳber bessere Ausdauer und profitieren auch von den Vorteilen deiner RÃỳstung.\n\nWenn ihre Lebenspunkte auf 0 fallen, verblassen sie Ãỳber mehrere ZÃỳge und kÃ¶nnen in dieser Zeit immer noch geheilt werden. Wenn keine Feinde zugegen sind, verblassen die Abbilder und finden zu ihrem Herrn zurÃỳck.
actors.mobs.npcs.prismaticimage.discover_hint=Du kannst diesen Charakter mit einer bestimmten Schriftrolle finden.

actors.mobs.npcs.ratking.name=KÃ¶nig der Ratten
actors.mobs.npcs.ratking.not_sleeping=Ich schlafe nicht!
actors.mobs.npcs.ratking.what_is_it=Was ist? Ich habe keine Zeit fÃỳr deinen Unsinn. Mein KÃ¶nigreich regiert sich nicht von alleine!
actors.mobs.npcs.ratking.confused=Wa... Wo bin ich? Mein KÃ¶nigreich braucht mich!
actors.mobs.npcs.ratking.crown_clothes=Zieh dir was an! Du bist nicht in der Verfassung, mit MajestÃĊten zu sprechen!
actors.mobs.npcs.ratking.crown_desc=Oooh, ist diese Krone fÃỳr mich? Sie glÃĊnzt viel mehr als meine, darum werde ich sie gnÃĊdigerweise annehmen!\n\nTatsÃĊchlich gedenke ich sogar, dir eine Belohnung fÃỳr diese Krone anzubieten. Eine ungeheure Macht, die eines Helden wie dir angemessen ist! WÃỳrde dir das gefallen?
actors.mobs.npcs.ratking.crown_yes=SelbstverstÃĊndlich!
actors.mobs.npcs.ratking.crown_info=ErzÃĊhle mir erstmal mehr.
actors.mobs.npcs.ratking.crown_no=Lieber doch nicht...
actors.mobs.npcs.ratking.crown_thankyou=Hehehe, vielen Dank! Jetzt geh' und mach deinen KÃ¶nig stolz!
actors.mobs.npcs.ratking.crown_fine=Wohl an! Es ist ja nicht so, dass ich sie wollte...
actors.mobs.npcs.ratking.crown_after=Freust du dich Ãỳber deine neue RÃỳstung? Keine RÃỳcknahme!
actors.mobs.npcs.ratking.desc_crown=Diese Ratte ist etwas grÃ¶Ãer als eine gewÃ¶hnliche Beutelratte. Sie trÃĊgt die Krone des ZwergenkÃ¶nigs auf ihrem Kopf.
actors.mobs.npcs.ratking.desc_birthday=Diese Ratte ist etwas grÃ¶Ãer als eine gewÃ¶hnliche Beutelratte. Sie trÃĊgt einen klitzekleinen grÃỳne Partyhut anstelle der Ãỳblichen Krone. Alles Gute zum Geburtstag, RattenkÃ¶nig!
actors.mobs.npcs.ratking.desc_winter=Diese Ratte ist etwas grÃ¶Ãer als eine gewÃ¶hnliche Beutelratte. Sie trÃĊgt eine klitzekleine festliche Kopfbedeckung anstelle der Ãỳblichen Krone. SchÃ¶ne Feiertage!
actors.mobs.npcs.ratking.desc=Diese Ratte ist etwas grÃ¶Ãer als eine gewÃ¶hnliche Beutelratte. Sie trÃĊgt eine klitzekleine Krone auf ihrem Kopf.
actors.mobs.npcs.ratking.discover_hint=Du findest diesen Charakter am Ende einer bestimmten Region im Dungeon.

