actors.mobs.yogdzewa$larva.desc=Diese winzigen Ausgeburten von Yog-Dzewa sind einfache Lakaien, die leicht zu produzieren sind. Obwohl sie einzeln schwach sind, kÃ¶nnen sie schnell herbeigerufen und in der Masse ÃỳberwÃĊltigend werden.
