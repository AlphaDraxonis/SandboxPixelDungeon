actors.mobs.npcs.blacksmith.exit_warn_none=Biste schon fertig? Du hast ja fast gar nix an Gold! Solltest schon _40 StÃỳck_ beschaffen kÃ¶nnen!\n\n_Denk dran, ich lass dich nich' noch mal runter, wenn du erst wieder oben bist._
