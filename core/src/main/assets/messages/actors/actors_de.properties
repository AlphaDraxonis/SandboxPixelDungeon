actors.mobs.dm300.rankings_desc=Durch DM-300 zermalmt
actors.mobs.dm300.def_verb=geblockt
actors.mobs.dm300.defeated=KRITISCHER SCHADEN! INITIIERE STILLLEGU-
actors.mobs.dm300.desc=DM-300 ist die grÃ¶Ãte und stÃĊrkste 'Verteidigungsmaschine', die die Zwerge je gebaut haben. Eine solch wunderbare Maschine lÃĊsst sich nur schwer herstellen, so dass die Zwerge insgesamt nur sehr wenige gebaut haben, die die EingÃĊnge ihrer unterirdischen Hauptstadt bewachten.\n\nDiese Maschine ist mit Ventilen ausgestattet, durch die toxische Abgase ausgestoÃen werden, und mit einem Hochleistungsbohrer, den sie zum Angriff und zum Aufbrechen des Bodens einsetzen kann. DM-300 kann sich auÃerdem mit dem Stromnetz verbinden, was seine KrÃĊfte noch weiter steigert.
actors.mobs.dm300.desc_supercharged=DM-300 ist elektrisch geladen. In diesem Zustand ist er unverwundbar und bewegt sich mit doppelter Geschwindigkeit! Zudem kann er sich nun durch _soliden Fels_ graben, auch wenn er sich dabei langsamer bewegt.\n\nDM-300 in diesem Zustand anzugreifen ist sinnlos; jedoch _muss ihn etwas in dieser HÃ¶hle mit Energie versorgen._ Dies zu zerstÃ¶ren, kÃ¶nnte ihn schwÃĊchen.

