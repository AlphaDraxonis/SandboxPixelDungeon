actors.mobs.crystalwisp.desc=Ein kleiner, zorniger fliegender Brocken aus gehÃĊrtetem Kristall, der ein helles Leuchten hervorbringt. KristallbÃỳschel sind nicht allzu stark, aber bei freier Schusslinie werden sie Lichtstrahlen auf dich abfeuern.\n\nKristallbÃỳschel sind klein genug, um sich durch die verschiedenen Kristallspitzen zu bewegen, aber sie kÃ¶nnen nicht hindurchschieÃen.
