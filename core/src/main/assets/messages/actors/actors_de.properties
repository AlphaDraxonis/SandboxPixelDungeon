actors.mobs.mimic.desc=Mimiks sind magische Kreaturen, die jede Gestalt annehmen kÃ¶nnen, die sie wollen. In den Dungeons wÃĊhlen sie fast immer die Gestalt einer Schatztruhe, um so arglose Abenteurer zu verfÃỳhren.\n\nMimiks fÃỳgen heftige Bisse zu, aber sie haben oft mehr SchÃĊtze, als eine normale Truhe.
