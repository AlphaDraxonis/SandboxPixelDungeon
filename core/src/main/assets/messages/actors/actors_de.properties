actors.mobs.warlock.desc=Als das Interesse der Zwerge von der Ingenieurskunst zur Magie wechselte, kamen die Hexer in der Stadt an die Macht. Sie begannen mit Elementarmagie, wandten sich aber schnell der DÃĊmonologie und TotenbeschwÃ¶rung zu. Der stÃĊrkste dieser Hexer besetzte den Thron in der Zwergenstadt, und seinen Kumpanen wurde es gestattet, weiterhin ihre dunkle Magie zu praktizieren, solange sie ihm ihren freien Willen unterordnen.\n\nDiese Hexer besitzen starke, zerstÃ¶rerische Magie, und sie sind dazu in der Lage, zeitweise die Verbesserungsmagie an deiner AusrÃỳstung auÃer Kraft zu setzen. Je mehr ein Gegenstand verbessert ist, desto stÃĊrker wird er davon betroffen sein.

