actors.mobs.crystalmimic.desc=Mimiks sind magische Kreaturen, die jede beliebige Gestalt annehmen kÃ¶nnen. Im Dungeon nehmen sie fast immer die Gestalt einer Schatztruhe an, um damit arglose Abenteurer zu verfÃỳhren.\n\nKristall-Mimiks sind schlauer als ihre gewÃ¶hnlichen Artgenossen und ziehen es vor, den Kampf zu vermeiden und dabei GegenstÃĊnde zu stehlen. Werden sie entdeckt, so versuchen sie, das Weite zu suchen, auÃerdem sind sie dazu in der Lage, mit ihren Angriffen Feinde an eine andere Position zu verschieben.

actors.mobs.crystalspire.name=Kristallspitze
actors.mobs.crystalspire.warning=Der Kristall vibriert, als du darauf schlÃĊgst. Wenn du so weitermachst, wird das Aufmerksamkeit auf dich ziehen...
actors.mobs.crystalspire.alert=Die Vibrationen werden stÃĊrker und rollen durch die ganze HÃ¶hle!
actors.mobs.crystalspire.desc=Diese gigantische Kristallspitze aus ultrahartem Kristall ist vermutlich der Ursprung all der eigenartigen kristallinen Kreaturen in dieser HÃ¶hle. Deine normalen Waffen sind dagegen kaum zu gebrauchen, du mÃỳsstest schon deine Spitzhacke verwenden, falls du sie zerstÃ¶ren willst.\n\n_Sieh zu, dass du vorbereitet bist, bevor du loslegst._ Einen derart mÃĊchtigen Kristall zu zertrÃỳmmern wird bestimmt eine Weile dauern, und wahrscheinlich wirst du dabei auch nicht ungestÃ¶rt bleiben. Die Kristallspitze selbst verfÃỳgt mÃ¶glicherweise sogar Ãỳber gewisse Mittel der Selbstverteidigung. _Vielleicht kÃ¶nnen die Angriffe der Kristallspitze gegen ihre eigenen Lakaien gerichtet werden._
actors.mobs.crystalspire.discover_hint=Du kannst diesen Gegner wÃĊhrend einer bestimmten Aufgabe finden.

