actors.hero.spells.spiritform.desc=Der Kleriker wÃĊhlt einen Ring oder ein Artefakt, die er wÃĊhrend dieses Abenteuers identifiziert hat (auÃer dem Heiligen Folianten), und erfÃỳllt Dreieinigkeit mit dessen Wirkung.\n\nWenn ein Ring gewÃĊhlt wird, gewÃĊhrt Dreieinigkeit die Wirkung dieses Rings mit +%1$d fÃỳr 20 ZÃỳge.\n\nWenn ein Artefakt gewÃĊhlt wird, ahmt Dreieinigkeit die Wirkung dieses Artefakts mit +%2$d nach. Jedes Artefakt hat unterschiedliche spezifische Effekte und RÃỳstungsladungskosten, wenn es mit Dreieinigkeit verwendet wird.\n\nDieser Spruch ersetzt jeden anderen Geisteffekt, mit dem Dreieinigkeit derzeit erfÃỳllt ist.
