actors.mobs.rotheart.name=FÃĊulnisherz
actors.mobs.rotheart.desc=Die Frucht der FÃĊulnispflanze ist sehr einzigartig. Anstatt zu verrotten und NÃĊhrstoffe herzugeben, wÃĊchst diese Frucht, verhÃĊrtet sich und umschlieÃt den Samen. Sie schÃỳtzt damit die inneren Organe, welche in der Frucht wachsen. Diese groÃe Kugelform bezeichnet man als das Herz einer ausgewachsenen FÃĊulnispflanze.
