actors.mobs.thief.desc=Obwohl diese Insassen aus ihren Zellen befreit sind, ist dieser Ort immer noch ihr GefÃĊngnis. Mit der Zeit hat dieser Ort sie sowohl ihres Verstands als auch ihrer Freiheit beraubt. Diese wahnwitzigen Diebe und Banditen haben schon vor langer Zeit vergessen, wer sie sind und warum sie stehlen.\n\nDiese Feinde tendieren dazu, zu stehlen und wegzulaufen, anstatt zu kÃĊmpfen. Stelle sicher, sie im Blick zu behalten, sonst wirst du deine gestohlenen Dinge vielleicht nie wieder finden.

actors.mobs.tormentedspirit.name=gequÃĊlte Seele
actors.mobs.tormentedspirit.desc=GequÃĊlte Seelen sind eigentlich gutmÃỳtige Geister, die allerdings verflucht wurden. Solange sie verflucht sind, werden sie genau wie Spuk alles und jeden angreifen, und sind dazu noch stÃĊrker!\n\nEs kÃ¶nnte mÃ¶glich sein, den Fluch durch Benutzung des richtigen Gegenstandes in unmittelbarer NÃĊhe der gequÃĊlten Seele zu lÃ¶sen. Sicherlich wird die Seele dafÃỳr dankbar sein...
