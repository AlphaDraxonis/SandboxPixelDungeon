actors.hero.talent.hearty_meal.title=herzhafte Mahlzeit
actors.hero.talent.hearty_meal.desc=_+1:_ Das Essen von Nahrung heilt den Krieger um _4 LP_, wenn er 33% oder weniger Gesundheit hat.\n\n_+2:_ Das Essen von Nahrung heilt den Krieger um _6 LP_, wenn er 33% oder weniger Gesundheit hat.
actors.hero.talent.veterans_intuition.title=Intuition des Veteranen
actors.hero.talent.veterans_intuition.desc=_+1:_ Der Krieger identifiziert Waffen _1,75x schneller_ und RÃỳstungen _2,5x schneller_.\n\n_+2:_ Der Krieger identifiziert Waffen _2,5x schneller_ und RÃỳstungen, _sobald er sie ausrÃỳstet_.
actors.hero.talent.provoked_anger.title=provozierter Zorn
actors.hero.talent.provoked_anger.desc=_+1:_ Wenn ein Abschirmungseffekt des Kriegers durch Schaden zerstÃ¶rt wird, verursacht sein nÃĊchster physischer Angriff _3 Bonusschaden_.\n\n_+2:_ Wenn ein Abschirmungseffekt des Kriegers durch Schaden zerstÃ¶rt wird, verursacht sein nÃĊchster physischer Angriff _5 Bonusschaden_.
actors.hero.talent.iron_will.title=eiserner Wille
actors.hero.talent.iron_will.desc=_+1:_ Die SchildstÃĊrke des Siegels des Kriegers wird _um 1_ erhÃ¶ht.\n\n_+2:_ Die SchildstÃĊrke des Siegels des Kriegers wird _um 2_ erhÃ¶ht.
actors.hero.talent.iron_will.meta_desc=_Wenn dieses Talent von einem anderen Helden erlangt wird_, verleiht es passiv eine 1 oder 2 maximale Schildversion des Effekts vom zerbrochenen Siegel des Kriegers.

actors.hero.talent.iron_stomach.title=eiserner Magen
actors.hero.talent.iron_stomach.desc=_+1:_ Nahrung zu sich nehmen braucht fÃỳr den Krieger 1 Zug und verleiht ihm _75% Schadenswiderstand_ wÃĊhrend des Essens.\n\n_+2:_ Nahrung zu sich nehmen braucht fÃỳr den Krieger 1 Zug und verleiht ihm _100% Schadenswiderstand_ beim Essen.
actors.hero.talent.liquid_willpower.title=flÃỳssige Willenskraft
