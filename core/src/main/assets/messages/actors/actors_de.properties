actors.mobs.npcs.blacksmith.desc=Der Trollschmied sieht aus wie alle Trolle: Er ist hochgewachsen und mager, und seine Haut erinnert in Farbe und Struktur an Stein. Der Trollschmied hantiert mit unverhÃĊltnismÃĊÃig kleinen Werkzeugen herum.

actors.mobs.npcs.ghost.name=Trauriger Geist
actors.mobs.npcs.ghost.rat_1=Seid gegrÃỳÃt, %s... Einst war ich wie Ihr â stark und zuversichtlich... Doch dann wurde ich von einer widerwÃĊrtigen Bestie erschlagen... Ich kann diesen Ort nicht verlassen... Nicht, bevor ich gerÃĊcht werde... Vernichtet die _verfaulende Ratte,_ die mir das Leben nahm...\n\nSie kriecht auf dieser Ebene umher... Verteilt ihren Gestank Ãỳberall... _HÃỳtet Euch vor ihrem widerwÃĊrtigen Geruch und zersetzenden Biss. Ihr Gift lÃ¶st sich im Wasser auf..._
actors.mobs.npcs.ghost.rat_2=Bitte... Helft mir... Erschlagt die abscheuliche Kreatur...\n\n_BekÃĊmpft sie nah am Wasser... Meidet ihren Gestank..._
actors.mobs.npcs.ghost.gnoll_1=Seid gegrÃỳÃt, %s... Einst war ich wie Ihr â stark und zuversichtlich... doch dann wurde ich von einem verschlagenen Wesen ermordet... Ich kann diesen Ort nicht verlassen... Nicht, bevor ich gerÃĊcht werde... TÃ¶tet den _Gnoll-Trickser_, der mir das Leben nahm...\n\nEr verhÃĊlt sich nicht wie normale Gnolle... Sondern versteckt sich und verwendet Wurfwaffen... _HÃỳtet Euch vor seinen Gift- und Brandpfeilen und meidet den Fernkampf..._
actors.mobs.npcs.ghost.gnoll_2=Bitte... Helft mir... Erschlagt den Trickser...\n\n_Lasst euch nicht treffen... Geht nah an ihn ran..._
actors.mobs.npcs.ghost.crab_1=Seid gegrÃỳÃt, %s... Einst war ich wie Ihr â stark und zuversichtlich... doch dann wurde ich von einer uralten Kreatur niedergestreckt... Ich kann diesen Ort nicht verlassen... Nicht, bevor ich gerÃĊcht werde... TÃ¶tet die _gigantische Krabbe,_ welche mir das Leben nahm... \n\nDiese Kreatur ist unnatÃỳrlich alt... Sie hat eine massive Schere und einen festen Panzer... Seid vorsichtig... _Sie pariert viele Angriffe mit ihrer Schere. Ihr mÃỳsst sie Ãỳberraschen, andernfalls wird sie ein harter Gegner..._
actors.mobs.npcs.ghost.crab_2=Bitte... Helft mir... Erschlagt das Krustentier...\n\n_Es wird immer blocken... Wenn es euch kommen sieht..._
actors.mobs.npcs.ghost.find_me=Vielen Dank... findet mich...
actors.mobs.npcs.ghost.desc=Der Geist ist kaum sichtbar. Er sieht wie ein formloser, schwÃĊchlicher Lichtfleck mit einem trauernden Gesicht aus.

actors.mobs.npcs.imp.name=Ehrgeiziger Wicht
actors.mobs.npcs.imp.intro=Bist du ein Abenteurer? Ich liebe Abenteurer! Auf sie kann man sich immer verlassen, wenn etwas getÃ¶tet werden muss, oder? NatÃỳrlich fÃỳr ein Kopfgeld ;)
actors.mobs.npcs.imp.golems_1=In meinem Fall wÃĊren es _Golems_, die da umgebracht werden mÃỳssten. WeiÃt du, ich mÃ¶chte hier einen kleinen Laden erÃ¶ffnen, aber diese dummen Golems sind schlecht fÃỳrs GeschÃĊft! Man kann mit einem wandelnden Granitklumpen so schlecht verhandeln, verdammt nochmal! Also, bitte, tÃ¶te... sagen wir, _4 von ihnen_, und die Belohnung gehÃ¶rt dir.
actors.mobs.npcs.imp.monks_1=In meinem Fall wÃĊren es _MÃ¶nche_, die da umgebracht werden mÃỳssten. WeiÃt du, ich mÃ¶chte hier einen kleinen Laden erÃ¶ffnen, aber diese Irren kaufen selbst nichts und verscheuchen mir andere Kunden. Also, bitte, bringe... sagen wir, _5 von ihnen_ um die Ecke, und die Belohnung gehÃ¶rt dir.
actors.mobs.npcs.imp.golems_2=Na, wie lÃĊuft deine Golem-Safari? Vergiss nicht, die MÃỳnzen einzusammeln.
actors.mobs.npcs.imp.monks_2=Oh, du bist noch am Leben! Ich wusste, dass dein Kung-Fu stÃĊrker ist ;) Vergiss bloÃ nicht, denen diese MÃỳnzen abzuknÃ¶pfen.
actors.mobs.npcs.imp.cya=Bis bald, %s!
actors.mobs.npcs.imp.hey=Psst, %s!
actors.mobs.npcs.imp.desc=Wichte sind geringere DÃĊmonen. Sie sind nicht fÃỳr ihre StÃĊrke oder magischen FÃĊhigkeiten bekannt, aber sie sind intelligent und anpassungsfÃĊhig. Viele Wichte bevorzugen das Zusammenleben mit Nicht-DÃĊmonen.

