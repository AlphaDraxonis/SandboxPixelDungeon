actors.buffs.corrosion.desc=Eine starke SÃĊure lÃ¶st â mit atemberaubender Geschwindigkeit â Fleisch, Metall und Knochen auf.\n\nDer Schaden durch die Zersetzung steigt mir der Zeit, in der sich das Ziel weiter auflÃ¶st.\n\nVerbleibende ZÃỳge mit Zersetzung: %1$s.\nDerzeitiger Zersetzungsschaden: %2$d.

