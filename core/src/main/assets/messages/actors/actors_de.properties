actors.mobs.npcs.blacksmith.exit_warn_med=Biste schon fertig? Bisschen Gold hast du ja, aber in der Mine ist definitiv noch mehr. Solltest schon _40 StÃỳck_ beschaffen kÃ¶nnen!\n\n_Denk dran, ich lass dich nich' noch mal runter, wenn du erst wieder oben bist._
actors.mobs.npcs.blacksmith.exit_warn_high=Biste schon fertig? Hast ja ordentlich Gold dabei, aber ich kÃ¶nnte noch etwas mehr gebrauchen. Solltest schon _40 StÃỳck_ beschaffen kÃ¶nnen!\n\n_Denk dran, ich lass dich nich' noch mal runter, wenn du erst wieder oben bist._
actors.mobs.npcs.blacksmith.exit_warn_full=Biste schon fertig? Du hast ja viel Gold dabei, aber sieh zu, dass du nix von deinem Krempel unten liegen lÃĊsst.\n\n_Denk dran, ich lass dich nich' noch mal runter, wenn du erst wieder oben bist._
actors.mobs.npcs.blacksmith.exit_warn_crystal=Der Riesenkristall is' auch noch da unten. Ich zahl' extra, wenn du den zerstÃ¶rst.
