actors.mobs.dwarfking.rankings_desc=Fiel vor dem KÃ¶nig der Zwerge
actors.mobs.dwarfking.desc=Vor vielen Jahren entdeckte einer der hÃ¶chsten Zauberer am Hof der Zwerge Geheimnisse, die ihm unglaubliche Macht Ãỳber Leben und Tod verliehen. Schon bald missbrauchte er diese Macht, unterjochte und verdarb seinesgleichen, seinen KÃ¶nig, und schlieÃlich jeden der ZwergenbÃỳrger. Seither ist er KÃ¶nig, Gebieter Ãỳber eine Legion untoter Vasallen.\n\nDer ZwergenkÃ¶nig ist ein aggressiver Feind, der seine Gegner bevorzugt durch Horden seiner untoten Lakaien umzingelt und ÃỳberwÃĊltigt.
