actors.mobs.gnollgeomancer.warning=Der Geomant beginnt sich zu rÃỳhren. Vergewissere dich, dass du bereit bist, bevor du fortfÃĊhrst!
actors.mobs.gnollgeomancer.alert=Der Geomant erwacht! Die gesamte HÃ¶hle scheint in Bewegung zu geraten, als er mit verrÃỳcktem GelÃĊchter davonspringt!
