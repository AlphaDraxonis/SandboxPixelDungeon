actors.mobs.ebonymimic.desc=Mimiks sind magische Kreaturen, die jede beliebige Gestalt annehmen kÃ¶nnen. Im Dungeon nehmen sie fast immer die Gestalt einer Schatztruhe an, um damit arglose Abenteurer zu verfÃỳhren.\n\nEbenholz-Mimiks sind verstohlene Mimiks, die Ãỳber die FÃĊhigkeit verfÃỳgen, nahezu unsichtbar zu werden. Sie lauern auf Dingen, mit denen Abenteurer wahrscheinlich interagieren werden, beinhalten aber auch eigene Beute. Sie sind nicht zÃĊher als normale Mimiks, sobald sie entdeckt werden, aber ihr Ãberraschungsbiss ist verheerend.
