actors.buffs.berserk.recovering=sich erholend
actors.buffs.berserk.angered_desc=Die Schwere der Verletzungen des Berserkers verstÃĊrkt seine Angriffe. Wenn der Berserker physischen Schaden nimmt, baut sich seine Wut auf und verleiht ihm zusÃĊtzlichen Schaden auf seine Angriffe. Auch Schaden, der von der RÃỳstung absorbiert wird, steigert die Wut.\n\nDiese Wut nimmt jedoch mit der Zeit ab. Je niedriger die Lebenspunkte, desto lÃĊnger hÃĊlt sie an.\n\nBei 100%% Wut kann der Berserker in Rage verfallen, wodurch er Abschirmung in HÃ¶he der Stufe seiner RÃỳstung und der ihm fehlenden Lebenspunkte erhÃĊlt. In Rage verfÃĊllt dieser Schutz mit der Zeit, und sobald er verschwunden ist, muss der Berserker ausruhen, ehe er wieder Wut aufbauen kann.\n\nDerzeitige Wut: _%1$.0f%%_\n_+%2$.0f%%_ Schaden\n\nRage-Abschirmung mit der derzeitigen RÃỳstung und LP: _%3$d_
actors.buffs.berserk.berserk_desc=Furcht und Unsicherheit verblassen, nur der blanke Zorn bleibt. Dieser Zustand verleiht dem Berserker groÃe Macht: _er teilt 50%% mehr Schaden aus und erhÃĊlt zusÃĊtzliche Abschirmung,_ doch die Abschirmung schwindet jeden Zug.\n\nSobald die Abschirmung auf 0 gesunken ist, endet die Rage.\n\nDer Berserker muss nun eine Zeitlang ruhen, bis sich seine Wut wieder aufbauen kann.\n\nVerbleibende Abschirmung: %d
