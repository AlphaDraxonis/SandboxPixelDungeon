actors.mobs.gnollsapper.name=Gnoll-Pionier
actors.mobs.gnollsapper.desc=Ein kleiner und schwacher, aber intelligenter Gnoll mit bleichem Fell und einem Ranzen voll von verschiedenen GerÃĊten. Sie sind vermutlich hier, um Dunkelgold zu erkunden und zu schÃỳrfen und haben zu ihrem Schutz einen WÃĊchter in der NÃĊhe. Sie kÃ¶nnen zwar kÃĊmpfen, aber ihre Angriffe sind erbÃĊrmlich schwach, nicht stÃĊrker als die eines Gnoll-SpÃĊhers.\n\nAnstelle eines direkten Kampfes bevorzugen es die Pioniere, ihre verschiedenen GerÃĊte einzusetzen, um so das Gestein fÃỳr sich kÃĊmpfen zu lassen. Sie selbst sind nicht mit Erdreich bewegender Magie vertraut und werden daher umso mehr Gebrauch von ihren GerÃĊten und Vorrichtungen machen. _Es dÃỳrfte eine Menge Wege geben, ihre Angriffe gegen sie selbst oder gegen ihren WÃĊchter zu richten._
