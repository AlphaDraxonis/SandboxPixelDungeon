actors.mobs.pylon.desc_active=Ein Strommast, welcher dazu gedacht ist, die ElektrizitÃĊt zu regeln, die die Maschinen hier in dieser Gegend versorgt. Dieser Mast summt geradezu von der elektrischen Energie, das muss es wohl sein, woher der DM-300 seine Superladung hat!\n\nIn diesem Zustand sind die Strommasten verwundbar, jedoch werden sie im Uhrzeigersinn StromschlÃĊge in die umgebenden Felder schieÃen. Aufgrund ihrer massiven metallischen Bauweise kÃ¶nnen Strommasten eine groÃe Menge an Schaden absorbieren.

actors.mobs.rat.name=Beutelratte
