actors.hero.talent.hallowed_ground.desc=_+1:_ Der Priester kann _Geheiligter Boden_ wirken, einen Zauber, der GelÃĊnde in einem _3x3-Bereich_ fÃỳr 20 ZÃỳge heiligt und dafÃỳr 2 Ladungen benÃ¶tigt.\n\n_+2:_ Der Priester kann _Geheiligter Boden_ wirken, einen Zauber, der GelÃĊnde in einem _5x5-Bereich_ fÃỳr 20 ZÃỳge heiligt und dafÃỳr 2 Ladungen benÃ¶tigt.\n\n_+3:_ Der Priester kann _Geheiligter Boden_ wirken, einen Zauber, der GelÃĊnde in einem _7x7-Bereich_ fÃỳr 20 ZÃỳge heiligt und dafÃỳr 2 Ladungen benÃ¶tigt.\n\nWenn er gewirkt wird, heilt Geheiligter Boden VerbÃỳndete um 15 LP, macht Gegner kurzzeitig bewegungsunfÃĊhig und verbreitet kurzes Gras. AnschlieÃend heilt er langsam VerbÃỳndete, verkrÃỳppelt Gegner und lÃĊsst hohes Gras zufÃĊllig wachsen. Geheiligter Boden gewÃĊhrt dem Priester Abschirmung statt Heilung und wird durch Feuer zerstÃ¶rt.
actors.hero.talent.mnemonic_prayer.title=Eingedenken
actors.hero.talent.mnemonic_prayer.desc=_+1:_ Der Priester kann _Eingedenken_ wirken, einen Zauber, der die Wirkung von positiven/negativen Effekten auf VerbÃỳndete/Feinde um _3 ZÃỳge_ verlÃĊngert. Dies kostet 1 Ladung.\n\n_+2:_ Der Priester kann _Eingedenken_ wirken, einen Zauber, der die Wirkung von positiven/negativen Effekten auf VerbÃỳndete/Feinde um _4 ZÃỳge_ verlÃĊngert. Dies kostet 1 Ladung.\n\n_+3:_ Der Priester kann _Eingedenken_ wirken, einen Zauber, der die Wirkung von positiven/negativen Effekten auf VerbÃỳndete/Feinde um _5 ZÃỳge_ verlÃĊngert. Dies kostet 1 Ladung.\n\nDas Wirken von Eingedenken benÃ¶tigt keine Zeit. Eingedenken kann eine bestimmte Wirkung von positiven und negativen Effekten nur einmal verlÃĊngern und hat keinen Einfluss auf RÃỳstungsfÃĊhigkeiten.

actors.hero.talent.lay_on_hands.title=Handauflegung
actors.hero.talent.lay_on_hands.desc=_+1:_ Der Paladin kann _Handauflegung_ wirken, einen Zauber, der einen nahen Charakter sofort um _15 LP_ heilt oder dem Paladin _15 Abschirmung_ gewÃĊhrt. Dies kostet 1 Ladung.\n\n_+2:_ Der Paladin kann _Handauflegung_ wirken, einen Zauber, der einen nahen Charakter sofort um _20 LP_ heilt oder dem Paladin _20 Abschirmung_ gewÃĊhrt Dies kostet 1 Ladung.\n\n_+3:_ Der Paladin kann _Handauflegung_ wirken, einen Zauber, der einen nahen Charakter sofort um _25 LP_ heilt oder dem Paladin _25 Abschirmung_ gewÃĊhrt Dies kostet 1 Ladung.\n\nÃberschÃỳssige Heilung durch diesen Zauber wird in Abschirmung umgewandelt. Handauflegung kann wiederholt gewirkt werden, kann aber nicht mehr als einen dreifach gewirkten Abschirmung gewÃĊhren.
actors.hero.talent.aura_of_protection.title=Aura des Schutzes
actors.hero.talent.aura_of_protection.desc=_+1:_ Der Paladin kann die _Aura des Schutzes_ wirken, einen Zauber, der dem Paladin und allen VerbÃỳndeten im Umkreis von 2 Feldern 20% Schadensresistenz und den Effekt der RÃỳstungsglyphe des Paladins mit +50% StÃĊrke fÃỳr 20 ZÃỳge gewÃĊhrt. Dies kostet 2 Ladungen.\n\n_+2:_ Der Paladin kann die _Aura des Schutzes_ wirken, einen Zauber, der dem Paladin und allen VerbÃỳndeten im Umkreis von 2 Feldern 30% Schadensresistenz und den Effekt der RÃỳstungsglyphe des Paladins mit +75% StÃĊrke fÃỳr 20 ZÃỳge gewÃĊhrt. Dies kostet 2 Ladungen.\n\n_+3:_ Der Paladin kann die _Aura des Schutzes_ wirken, einen Zauber, der dem Paladin und allen VerbÃỳndeten im Umkreis von 2 Feldern 40% Schadensresistenz und den Effekt der RÃỳstungsglyphe des Paladins mit +100% StÃĊrke fÃỳr 20 ZÃỳge gewÃĊhrt. Dies kostet 2 Ladungen.
actors.hero.talent.wall_of_light.title=Wand aus Licht
actors.hero.talent.wall_of_light.desc=_+1:_ Der Paladin kann _Wand aus Licht_ wirken, einen Zauber, der eine _3 Felder breite_ massive Wand vor dem Paladin erschafft, die Gegner abwehrt und 20 ZÃỳge lang anhÃĊlt. Dies kostet 3 Ladungen.\n\n_+2:_ Der Paladin kann _Wand aus Licht_ wirken, einen Zauber, der eine _5 Felder breite_ massive Wand vor dem Paladin erschafft, die Gegner abwehrt und 20 ZÃỳge lang anhÃĊlt. Dies kostet 3 Ladungen.\n\n_+3:_ Der Paladin kann _Wand aus Licht_ wirken, einen Zauber, der eine _7 Felder breite_ massive Wand vor dem Paladin erschafft, die Gegner abwehrt und 20 ZÃỳge lang anhÃĊlt. Dies kostet 3 Ladungen.\n\nDie Wand kann gerade oder diagonal platziert werden; es kann immer nur eine Wand gleichzeitig existieren.

actors.hero.talent.divine_intervention.title=gÃ¶ttlicher Eingriff
actors.hero.talent.divine_intervention.desc=_+1:_ In der Aufgestiegenen Gestalt kann der Kleriker _GÃ¶ttlicher Beistand_ wirken. Dies erhÃ¶ht die Abschirmung des Klerikers und aller VerbÃỳndeten um bis zu _150 Punkte_ und verlÃĊngert die Aufgestiegene Gestalt um _3 ZÃỳge._\n\n_+2:_ In der Aufgestiegenen Gestalt kann der Kleriker _GÃ¶ttlicher Beistand_ wirken. Dies erhÃ¶ht die Abschirmung des Klerikers und aller VerbÃỳndeten um bis zu _200 Punkte_ und verlÃĊngert die Aufgestiegene Gestalt um _4 ZÃỳge._\n\n_+3:_ In der Aufgestiegenen Gestalt kann der Kleriker _GÃ¶ttlicher Beistand_ wirken. Dies erhÃ¶ht die Abschirmung des Klerikers und aller VerbÃỳndeten um bis zu _250 Punkte_ und verlÃĊngert die Aufgestiegene Gestalt um _5 ZÃỳge._\n\n+4: In der Aufgestiegenen Gestalt kann der Kleriker _GÃ¶ttlicher Beistand_ wirken. Dies erhÃ¶ht die Abschirmung des Klerikers und aller VerbÃỳndeten um bis zu _300 Punkte_ und verlÃĊngert die Aufgestiegene Gestalt um _6 ZÃỳge._\n\nDie Kosten von GÃ¶ttlicher Beistand betragen satte 5 Foliantenladungen und es kann nur einmal in derselben Aufgestiegenen Form gewirkt werden.
actors.hero.talent.judgement.title=Richtspruch
actors.hero.talent.judgement.desc=_+1:_ In aufgestiegener Form kann der Kleriker _Richtspruch_ wirken, das allen sichtbaren Gegnern _10â20 Schaden_ zufÃỳgt.\n\n_+2:_ In aufgestiegener Form kann der Kleriker _Richtspruch_ wirken, das allen sichtbaren Gegnern _15â30 Schaden_ zufÃỳgt.\n\n_+3:_ In aufgestiegener Form kann der Kleriker _Richtspruch_ wirken, das allen sichtbaren Gegnern _20â40 Schaden_ zufÃỳgt.\n\n_+4:_ In aufgestiegener Form kann der Kleriker _Richtspruch_ wirken, das allen sichtbaren Gegnern _25â50 Schaden_ zufÃỳgt.\n\nRichtspruch kostet 3 Foliantenladungen. Richtspruch verursacht +33% Schaden fÃỳr jeden Zauber, den der Kleriker seit dem Eintreten in die aufgestiegene Form oder seit dem letzten Wirken von _Richtspruch_ gewirkt hat.
actors.hero.talent.flash.title=Blitz
actors.hero.talent.flash.desc=_+1:_ In der Aufgestiegenen Form kann der Kleriker mit _Blitz_ bis zu _3 Felder_ weit teleportieren.\n\n_+2:_ In der Aufgestiegenen Form kann der Kleriker mit _Blitz_ bis zu _4 Felder_ weit teleportieren.\n\n_+3:_ In der Aufgestiegenen Form kann der Kleriker mit _Blitz_ bis zu _5 Felder_ weit teleportieren.\n\n_+4:_ In der Aufgestiegenen Form kann der Kleriker mit _Blitz_ bis zu _6 Felder_ weit teleportieren.\n\nBlitz kostet anfangs 2 Foliantenladungen und 1 weitere Ladung fÃỳr jede Verwendung in derselben aufgestiegenen Form.

actors.hero.talent.body_form.title=KÃ¶rperform
actors.hero.talent.body_form.desc=Der Kleriker kann _KÃ¶rperform_ wirken, wodurch Dreieinigkeit die Kraft einer Verzauberung oder Glyphe erhÃĊlt, die er in diesem Abenteuer identifiziert hat. Dies kostet 2 Ladungen.\n\n+1: Bei Einsatz von Dreieinigkeit erhÃĊlt der Kleriker den gewÃĊhlten Effekt fÃỳr _20 ZÃỳge._\n\n+2: Bei Einsatz von Dreieinigkeit erhÃĊlt der Kleriker den gewÃĊhlten Effekt fÃỳr _27 ZÃỳge._\n\n+3: Bei Einsatz von Dreieinigkeit erhÃĊlt der Kleriker den gewÃĊhlten Effekt fÃỳr _33 ZÃỳge._\n\n+4: Bei Einsatz von Dreieinigkeit erhÃĊlt der Kleriker den gewÃĊhlten Effekt fÃỳr _40 ZÃỳge._\n\nDreieinigkeit kann jeweils nur mit einer KÃ¶rperform erfÃỳllt werden. Die RÃỳstungskosten von Dreieinigkeit sind hÃ¶her, wenn die gewÃĊhlte Glyphe selten und mÃĊchtig ist.
actors.hero.talent.mind_form.title=Verstandesform
actors.hero.talent.mind_form.desc=Der Kleriker kann _Verstandesform_ wirken, die Dreieinigkeit die Kraft eines Zauberstabs oder einer Wurfwaffe verleiht, die der Kleriker in diesem Abenteuer verwendet hat. Dies kostet 3 Ladungen.\n\n_+1:_ Bei Dreieinigkeit nutzt der Kleriker den Zauber- oder Wurfeffekt des gewÃĊhlten Gegenstands, als wÃĊre dieser _+3._\n\n_+2:_ Bei Dreieinigkeit nutzt der Kleriker den Zauber- oder Wurfeffekt des gewÃĊhlten Gegenstands, als wÃĊre dieser _+4._\n\n_+3:_ Bei Dreieinigkeit nutzt der Kleriker den Zauber- oder Wurfeffekt des gewÃĊhlten Gegenstands, als wÃĊre dieser _+5._\n\n_+4:_ Bei Dreieinigkeit nutzt der Kleriker den Zauber- oder Wurfeffekt des gewÃĊhlten Gegenstands, als wÃĊre dieser _+6._\n\nDreieinigkeit kann jeweils nur mit einer Verstandesform erfÃỳllt werden.
actors.hero.talent.spirit_form.title=Geistform
actors.hero.talent.spirit_form.desc=Der Kleriker kann _Geistform_ wirken, die Dreieinigkeit mit der Kraft eines Rings oder Artefakts erfÃỳllt, das der Kleriker in diesem Abenteuer identifiziert hat (mit Ausnahme des Heiligen Folianten). Dies kostet 4 Ladungen.\n\n_+1:_ Bei Einsatz von Dreieinigkeit erhÃĊlt der Kleriker fÃỳr 20 ZÃỳge den Effekt eines Rings mit _+1_ oder lÃ¶st den Effekt eines Artefakts mit _+4_ aus.\n\n_+2:_ Bei Einsatz von Dreieinigkeit erhÃĊlt der Kleriker fÃỳr 20 ZÃỳge den Effekt eines Rings mit _+2_ oder lÃ¶st den Effekt eines Artefakts mit _+6_ aus.\n\n_+3:_ Bei Einsatz von Dreieinigkeit erhÃĊlt der Kleriker fÃỳr 20 ZÃỳge den Effekt eines Rings mit _+3_ oder lÃ¶st den Effekt eines Artefakts mit _+8_ aus.\n\n_+4:_ Bei Einsatz von Dreieinigkeit erhÃĊlt der Kleriker fÃỳr 20 ZÃỳge den Effekt eines Rings mit _+4_ oder lÃ¶st den Effekt eines Artefakts mit _+10_ aus.\n\nDreieinigkeit kann jeweils nur mit einer Geistform erfÃỳllt werden. Artefakte haben unterschiedliche Effekte und RÃỳstungskosten, wenn sie durch Dreieinigkeit ausgelÃ¶st werden.

actors.hero.talent.beaming_ray.title=Strahl der Versetzung
actors.hero.talent.beaming_ray.desc=Der Kleriker kann von einem ermÃĊchtigten VerbÃỳndeten aus einen _Strahl der Versetzung_ fÃỳr 1 Ladung wirken. Dieser Strahl durchdringt WÃĊnde und teleportiert den VerbÃỳndeten an einen Zielort. Befindet sich dort ein Gegner, erscheint der VerbÃỳndete neben ihm und nimmt ihn ins Visier. Der Strahl der Versetzung kann sogar normalerweise unbewegliche VerbÃỳndete teleportieren, hat dabei aber nur die halbe Reichweite.\n\n_+1:_ Der Strahl der Versetzung hat eine maximale Reichweite von _4 Feldern_ und erhÃ¶ht den Bonus der Macht der Vielen auf _+35% Schaden_ gegen den nÃĊchsten Gegner fÃỳr 10 ZÃỳge.\n\n_+2:_ Der Strahl der Versetzung hat eine maximale Reichweite von _8 Feldern_ und erhÃ¶ht den Bonus der Macht der Vielen auf _+40% Schaden_ gegen den nÃĊchsten Gegner fÃỳr 10 ZÃỳge.\n\n_+3:_ Der Strahl der Versetzung hat eine maximale Reichweite von _12 Feldern_ und erhÃ¶ht den Bonus der Macht der Vielen auf _+45% Schaden_ gegen den nÃĊchsten Gegner fÃỳr 10 ZÃỳge.\n\n_+4:_ Der Strahl der Versetzung hat eine maximale Reichweite von _16 Feldern_ und erhÃ¶ht den Bonus der Macht der Vielen auf _+50% Schaden_ gegen den nÃĊchsten Feind fÃỳr 10 ZÃỳge.
actors.hero.talent.life_link.title=Lebensband
actors.hero.talent.life_link.desc=Der Kleriker kann _Lebensband_ zwischen sich und einem ermÃĊchtigten VerbÃỳndeten fÃỳr 2 Ladungen wirken. Dieser Zauber bewirkt, dass der Schaden zwischen dem Kleriker und seinem VerbÃỳndeten geteilt wird und dass vorteilhafte Klerikerzauber der Klasse 3 oder niedriger auf beide wirken, wenn einer von ihnen betroffen ist.\n\n_+1:_ Lebensband hÃĊlt _10 ZÃỳge_ an und erhÃ¶ht den Bonus der Macht der Vielen auf _-35% erlittenen Schaden._\n\n_+2:_ Lebensband hÃĊlt _13 ZÃỳge_ an und erhÃ¶ht den Bonus der Macht der Vielen auf _-40% erlittenen Schaden._\n\n_+3:_ Lebensband hÃĊlt _17 ZÃỳge_ an und erhÃ¶ht den Bonus der Macht der Vielen auf _-45% erlittenen Schaden._\n\n_+4:_ Lebensband hÃĊlt _20 ZÃỳge_ an und erhÃ¶ht den Bonus der Macht der Vielen auf _-50% erlittenen Schaden._
actors.hero.talent.stasis.title=EntrÃỳckung
actors.hero.talent.stasis.desc=Der Kleriker kann _EntrÃỳckung_ auf einen ermÃĊchtigten VerbÃỳndeten wirken. Dies kostet 2 Ladungen. EntrÃỳckung entfernt den VerbÃỳndeten vorÃỳbergehend aus dem Dungeon und erhÃĊlt die verbleibende Zeit aller positiven Effekte, einschlieÃlich der Macht der Vielen. Der VerbÃỳndete erscheint wieder neben dir, sobald der Effekt endet. EntrÃỳckung kann sofort und kostenlos erneut gewirkt werden, um den Effekt vorzeitig zu beenden. EntrÃỳckung wirkt auch auf unbewegliche VerbÃỳndete, kann diese aber nicht zwischen Dungeon-Ebenen bewegen.\n\n_+1:_ EntrÃỳckung hÃĊlt maximal _60 ZÃỳge_ an.\n\n_+2:_ EntrÃỳckung hÃĊlt maximal _90 ZÃỳge_ an.\n\n_+3:_ EntrÃỳckung hÃĊlt maximal _120 ZÃỳge_ an.\n\n_+4:_ EntrÃỳckung hÃĊlt maximal _150 ZÃỳge_ an.\n\nDer Kleriker kann auÃerdem Strahl der Versetzung wirken, wenn sich ein VerbÃỳndeter in EntrÃỳckung befindet, um ihn wiederzubeschwÃ¶ren, oder Lebensband einsetzen, um dessen Effekt prÃĊventiv anzuwenden. VerbÃỳndete profitieren jedoch nicht von Lebensband, wÃĊhrend sie sich in EntrÃỳckung befinden.


