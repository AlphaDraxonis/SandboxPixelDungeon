actors.mobs.dm100.desc=Der DM-100 ist eine frÃỳhe Version der 'Verteidigungsmaschine' der Zwerge, er war dazu gedacht, die Zwergen-Bergleute in den HÃ¶hlen unter diesem GefÃĊngnis zu beschÃỳtzen. Der elektrische Schlag der Maschine erwies sich aber als zu schwach, also schenkte man sie der Menschenstadt darÃỳber. Jahrelang wurden sie nicht eingesetzt, dann aber fanden sie ihren Weg in das GefÃĊngnis, wo die WÃĊrter sie anfangs als zu grausam befanden. Doch als die Gefangenen immer widerspenstiger wurden, wurden sie zu schlieÃlich einer Notwendigkeit.

actors.mobs.dm200.name=DM-200
actors.mobs.dm200.vent=Der DM-200 schieÃt einen Strahl aus toxischen Abgasen!
actors.mobs.dm200.desc=Der DM-200 ist die zweite Generation der 'Verteidigungsmaschine' der Zwerge, er war dazu gedacht, die Zwergen-Bergleute in den HÃ¶hlen und in der Stadt weiter unten zu beschÃỳtzen. Diese Maschinen sind viel grÃ¶Ãer und sperriger als ihre VorlÃĊufer, sie greifen mit ihren verheerenden hydraulischen FÃĊusten an.\n\nIhre GrÃ¶Ãe ist jedoch zugleich auch ihre HauptschwÃĊche, denn sie passen nicht in die engen Tunnel und TÃỳrÃ¶ffnungen des Dungeons. Die Zwerge wogen diesen Mangel an Beweglichkeit des DM-200 dadurch auf, dass sie ihm die FÃĊhigkeit gaben, seine toxischen Abgase in Richtung weit entfernter oder unerreichbarer Gegner auszustoÃen.

actors.mobs.dm201.name=DM-201
actors.mobs.dm201.vent=Der DM-201 feuert eine zersetzende Granate!
actors.mobs.dm201.desc=Die Zwerge experimentierten kurz damit, die geringe Beweglichkeit des DM-200 stÃĊrker zu betonen und schufen einige DM-Modelle, die vÃ¶llig stationÃĊr sind. Der DM-201 ist ein nachgerÃỳsteter DM-200, der als Wachturm ohne BewegungsfÃĊhigkeit dient. Im Austausch fÃỳr die nicht vorhandene Beweglichkeit haben die neuen Modelle deutlich mehr Haltbarkeit und Angriffskraft.\n\nDa die DM-201 keinen Motor haben, aus dem man Abgase ablassen kÃ¶nnte, haben die Zwerge sie stattdessen mit zersetzenden Gasgranaten ausgestattet! Die DM-201 gehen jedoch vorsichtig mit diesen Granaten um und feuern sie nur ab, wenn zwischen ihnen und ihrem Angreifer ausreichend Abstand ist.

actors.mobs.dm300.name=DM-300
