actors.mobs.elemental$frostelemental.name=Frostelementar
actors.mobs.elemental$frostelemental.desc=Elementare sind chaotische Wesen, die hÃĊufig hervorgebracht werden, wenn starke okkulte Magie nicht richtig kontrolliert wird. Elementare haben nur geringe Intelligenz, sie sind Ãỳblicherweise mit einer bestimmten Art von Magie verbunden.\n\nFrostelementare sind eine hÃĊufige Art von Elementaren, sie schwÃĊchen ihre Feinde durch KÃĊlte-Magie. Sie frieren ihr Ziel im Nahkampf oder durch einen gelegentlichen Fernkampfangriff ein. Ihre Magie ist in Wasser wesentlich effektiver.
actors.mobs.elemental$shockelemental.name=Schockelementar
actors.mobs.elemental$shockelemental.desc=Elementare sind chaotische Wesen, die hÃĊufig hervorgebracht werden, wenn starke okkulte Magie nicht richtig kontrolliert wird. Elementare haben nur geringe Intelligenz, sie sind Ãỳblicherweise mit einer bestimmten Art von Magie verbunden.\n\nSchockelementare sind eine weniger hÃĊufige Art von Elementaren, sie zerreiÃen ihre Feinde durch StromschlÃĊge und Lichtblitze. Im Nahkampf teilen sie StromschlÃĊge an nahe befindliche Feinde aus, und dem PrimÃĊrziel fÃỳgen sie zusÃĊtzlichen Schaden zu, wenn sie sich im Wasser befinden. Mitunter kÃ¶nnen sie auch einen Fernangriff mittels Lichtblitz gegen ihr Ziel richten, welcher dieses zeitweilig blendet.
actors.mobs.elemental$chaoselemental.name=Chaoselementar
actors.mobs.elemental$chaoselemental.desc=Elementare sind chaotische Wesen, die hÃĊufig hervorgebracht werden, wenn starke okkulte Magie nicht richtig kontrolliert wird. Elementare haben nur geringe Intelligenz, sie sind Ãỳblicherweise mit einer bestimmten Art von Magie verbunden.\n\nChaoselementare sind eine seltene und gefÃĊhrliche Art von Elementaren, die sich noch in keinem bestimmten Element stabilisiert haben. Beim Angriff entfesseln sie wilde und unvorhersehbare Magie.

actors.mobs.eye.name=Ãbles Auge
