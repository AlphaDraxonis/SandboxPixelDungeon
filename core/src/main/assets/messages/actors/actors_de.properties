actors.mobs.monk.desc=Diese MÃ¶nche sind Fanatiker, welche sich dem Schutz ihres KÃ¶nigs durch kÃ¶rperliche Kraft verschrieben haben. Ihre Ergebenheit ist so groÃ, dass sie ihren Geist vollstÃĊndig ihrem KÃ¶nig unterstellt haben, und nun streifen sie in der Zwergenstadt wie geistlose Zombies umher.\n\nMÃ¶nche verlassen sich einzig auf die Kunst des Nahkampfs, sie sind dazu in der Lage, ihre unbewaffneten FÃĊuste sowohl offensiv, als auch defensiv einzusetzen. Wenn sie sich konzentrieren, werden MÃ¶nche die nÃĊchste physische Attacke gegen sie abwehren, selbst, wenn diese normalerweise garantiert getroffen hÃĊtte. MÃ¶nche bauen schneller Konzentration auf, wenn sie sich bewegen, und im direkten Kampf langsamer.
actors.mobs.monk$focus.name=konzentriert
