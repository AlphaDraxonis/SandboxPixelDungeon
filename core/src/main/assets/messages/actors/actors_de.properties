actors.mobs.gnollguard.spear_warn=Der Gnoll landet einen bÃ¶sen Treffer mit der Spitze seines Speers!
actors.mobs.gnollguard.desc=Ein groÃ und stark aussehender Gnoll, bewaffnet mit Speer und Schild, aber ohne Helm. Diese WÃĊchter sind wahrscheinlich Grobiane in Ausbildung, die man dazu abgestellt hat, die Mine vor eindringenden Wildtieren schÃỳtzen zu helfen.\n\nDer Gnoll-WÃĊchter ist stark genug, um den Speer mit einer Hand zu fÃỳhren, aber er ist nicht sehr gut damit. _Er braucht genug offenes GelÃĊnde, um damit aus der Entfernung anzugreifen, und er verursacht wesentlich weniger Schaden, wenn du nah genug dran bist._
actors.mobs.gnollguard.desc_armor=_Ein Gnoll-Pionier in der NÃĊhe hÃĊlt ein GerÃĊt, das diesem WÃĊchter eine irdene RÃỳstung verleiht, die ihm zugefÃỳgten Schaden wesentlich verringert._
