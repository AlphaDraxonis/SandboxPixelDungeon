actors.mobs.npcs.blacksmith.intro_quest_start=Willste dich nÃỳtzlich machen, hÃĊ? Weil ich hÃĊtt' da 'nen Job fÃỳr dich. Ich hab' diese Werkstatt Ãỳber 'ner Goldmine gebaut, die is' am unteren Ende von der Leiter da. Schnapp dir 'ne Spitzhacke und schÃỳrf mir etwas _Dunkelgold-Erz_. _40 StÃỳck_ sollten reichen. Das Gestein da unten is' schÃ¶n weich, _du wirst dich mit etwas MÃỳhe durch die WÃĊnde graben kÃ¶nnen._\n\nWas heiÃt hier, wie werde ich dafÃỳr bezahlen? Du gieriges...\n\nIs' ja schon gut, ich kann dir was zusammenschmieden. Kannst dich glÃỳcklich schÃĊtzen, ich bin in dieser Gegend nÃĊmlich der einzige Schmied!
actors.mobs.npcs.blacksmith.intro_quest_crystal=Aber pass auf, die Mine ist gefÃĊhrlich fÃỳr kleine Menschlein wie dich. Is' schon seit 'ner Weile verlassen, inzwischen wachsen da 'ne Menge Kristalle. Die funkeln schÃ¶n, sind aber zu zerbrechlich und deshalb wertlos, zumal sie durch irgendwelche magischen Dinge beschÃỳtzt werden. Und die sind ziemlich stark, also _sei vorsichtig beim SchÃỳrfen,_ sonst ziehst du ihre Aufmerksamkeit auf dich.\n\nEs gibt auch irgendwo so 'nen _Riesenkristall._ Der is' aber viel stabiler, also mach dich auf 'nen Kampf gefasst, wenn du da drauf haust. Ich wette, es verlangsamt das Wachstum aller Kristalle wenn du das Ding zerbrichst; ich zahl' also extra, wenn du das hinkriegst!
actors.mobs.npcs.blacksmith.intro_quest_gnoll=Aber pass auf, die Mine is' gefÃĊhrlich fÃỳr kleine Menschlein wie dich. 'Ne Handvoll Gnolls sind auch auf das Gold aus, und jetz' zerlegen die da unten alles. Das sind dÃĊmliche Kerle, durch ihr Vorhauen gibt's Ãỳberall FelsbrÃỳche und TunneleinstÃỳrze. Da musste dich durchwÃỳhlen, also Obacht bei _frisch gebrochenem Fels._\n\nEin Gnoll da unten is', glaub' ich, ganz besonders Ãỳbel, wohl so 'ne Art _Geomantie-Schamane_. Ich zahl' extra, wenn du den findest und platt machst, aber der haut mit Sicherheit auch zurÃỳck, hÃĊhÃĊ.
actors.mobs.npcs.blacksmith.intro_quest_fungi=Aber pass auf, die Mine is' gefÃĊhrlich fÃỳr kleine Menschlein wie dich. Da wuchert inzwischen 'nen seltsames Pilzmonstrum herum. Das hat so 'ne Art Pilzwachen ausgebildet, die sind tÃ¶dlich, wenn se dich bemerken, aber wenigstens kÃ¶nnen se dir nich' hinterherrennen. _Bleib auÃer Sichtweite,_ wenne weiterleben willst.\n\nIch zahle extra, wenn du den _grÃ¶Ãten Pilz_ ausschalten kannst, aber das wird garantiert nich' einfach. Der is' mit in WÃĊnden versteckten Myzel-Knoten verbunden. Die meisten davon musste zerstÃ¶ren, eh' du ihm was anhaben kannst.
