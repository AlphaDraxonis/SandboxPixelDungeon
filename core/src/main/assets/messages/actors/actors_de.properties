actors.mobs.senior.name=Ãltesten-MÃ¶nch
actors.mobs.senior.desc=Diese MÃ¶nche sind Fanatiker, welche sich dem Schutz ihres KÃ¶nigs durch kÃ¶rperliche Kraft verschrieben haben. Ihre Ergebenheit ist so groÃ, dass sie ihren Geist vollstÃĊndig ihrem KÃ¶nig unterstellt haben, und nun streifen sie in der Zwergenstadt wie geistlose Zombies umher.\n\nDieser MÃ¶nch beherrscht den Nahkampf, er kann in Bewegung viel schneller an Konzentration gewinnen als normale MÃ¶nche. Wenn sie sich konzentrieren, werden MÃ¶nche die nÃĊchste physische Attacke gegen sie abwehren, selbst, wenn diese normalerweise garantiert getroffen hÃĊtte. MÃ¶nche bauen schneller Konzentration auf, wenn sie in Bewegung sind, und im direkten Kampf langsamer.

