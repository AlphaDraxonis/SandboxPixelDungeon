actors.mobs.npcs.sheep.desc=Dies ist ein magisches Schaf. Was daran so magisch sein soll? Du kannst es nicht tÃ¶ten. Es wird einfach stehenbleiben, sein Futter wiederkÃĊuen und sein sorgenfreies Leben genieÃen, bis es wie durch Zauberhand verschwindet.
