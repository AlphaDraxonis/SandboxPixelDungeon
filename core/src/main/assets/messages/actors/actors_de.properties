actors.mobs.yogfist.desc=Diese Faust ist ein Bestandteil von Yog-Dzewas Macht. Die FÃĊuste sind mit seiner Macht verbunden und sind unverwundbar, wenn sie sich in der NÃĊhe des Auges befinden.
actors.mobs.yogfist$burningfist.name=brennende Faust
actors.mobs.yogfist$burningfist.desc=Diese Faust ist aus chaotischer, feuriger Magie geformt. WÃĊhrend sie sich bewegt, wird sie stÃĊndig die Umgebung in Brand setzen. Sie ist auch in der Lage, SchÃỳsse mit feuriger Kraft abzufeuern, die beim Aufprall Flammen verbreiten.\n\nDie FÃĊhigkeit der Faust, Flammen zu verbreiten, wird in der NÃĊhe von Wasser unterdrÃỳckt, aber ihre Hitze ist so groÃ, dass das Wasser um sie herum nach kurzer Zeit verdampft!
actors.mobs.yogfist$soiledfist.name=Faust des Erdreichs
actors.mobs.yogfist$soiledfist.desc=Diese Faust ist aus chaotischer irdener Magie geformt. Wenn sie sich bewegt, wird sie stÃĊndig Pflanzen um sich herum sprieÃen lassen. Sie kann auch konzentrierte ErdstÃ¶Ãe abschieÃen, die ihr Ziel in schnell wachsende Reben und Wurzeln fesseln!\n\nDie Faust bezieht Kraft aus diesem Pflanzenleben und widersteht einer gewissen Menge Schaden, je nachdem, wie viel hohe oder zerfurchte Vegetation es in ihrer NÃĊhe gibt!
actors.mobs.yogfist$rottingfist.name=Faust der FÃĊulnis
actors.mobs.yogfist$rottingfist.desc=Diese Faust ist aus lebendiger FÃĊulnis geformt. Sie ist eine hoch aufragende Masse aus verwesendem Fleisch, die im Nahkampf ÃĊtzenden Schleim und im Fernkampf giftige Gase absondern kann. Schlimmer noch, die groÃe Masse der Faust lÃĊsst sie bluten, anstatt direkt Schaden zu nehmen.\n\nMit Wasser kann der Schleim abgewaschen werden, aber die Faust ist auch in der Lage, Wasser zu absorbieren, um sich selbst zu heilen! AuÃerdem fÃỳhrt eine BeschÃĊdigung der Faust, wÃĊhrend sie blutet, dazu, dass sich die Blutung zwar erneuert, aber nicht vergrÃ¶Ãert!
actors.mobs.yogfist$rustedfist.name=verrostete Faust
actors.mobs.yogfist$rustedfist.desc=Diese Faust ist aus lebendem Metall geformt. Es ist eine hoch aufragende Masse aus sich wandelndem Metall, die mÃĊchtige Nahkampfangriffe hat und ihre Ziele aus der Entfernung lahmlegen kann. Aufgrund ihrer enormen Masse nimmt die Faust jeden Schaden, der ihr zugefÃỳgt wird, nicht sofort, sondern Ãỳber einen lÃĊngeren Zeitraum auf.\n\nDie Faust ist jedoch unflexibel und kann sich nicht in enge GÃĊnge zwÃĊngen. Dazu kommt, dass sie Schaden zwar verlangsamt aufnehmen kann, der verzÃ¶gerte Schaden aber weiter zunehmen wird, wenn die Faust mehrmals getroffen wird.
actors.mobs.yogfist$brightfist.name=Faust des Lichts
actors.mobs.yogfist$brightfist.teleport=Die Faust teleportiert sich mit einem Lichtblitz davon, der dich erheblich blendet!
actors.mobs.yogfist$brightfist.desc=Diese Faust ist aus reiner Lichtenergie geformt. Sie ist in der Lage, bei jedem Zug krÃĊftige Strahlen aus gleiÃendem Licht zu schieÃen! Diese Strahlen werden dich vorÃỳbergehend blenden und zusÃĊtzlich schweren Schaden anrichten. Die Faust ist auch in der Lage, die Arena kurz in blendendes Licht zu tauchen, um zu entkommen!\n\nDie Faust hat jedoch keine besonderen FÃĊhigkeiten, die sie im Nahkampf einsetzen kÃ¶nnte.
actors.mobs.yogfist$darkfist.name=Faust der Dunkelheit
actors.mobs.yogfist$darkfist.teleport=Die Faust teleportiert sich in einem Strudel der Dunkelheit davon, wodurch deine Lichtquelle erlischt!
actors.mobs.yogfist$darkfist.desc=Diese Faust besteht aus purer, dunkler Energie. Sie kann jeden Zug mÃĊchtige Strahlen dunkler Magie ausstrahlen! Abgesehen davon, dass sie schweren Schaden verursachen, schwÃĊchen diese Strahlen deine Lichtquelle. Die Faust versteht es auch, das Gebiet kurz in Dunkelheit zu hÃỳllen, um zu entkommen!\n\nDiese Faust hat allerdings keine besonderen FÃĊhigkeiten fÃỳr den Nahkampf.


