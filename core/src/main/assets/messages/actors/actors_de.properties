actors.mobs.demonspawner.name=DÃĊmonenschleuder
actors.mobs.demonspawner.on_death=Als die DÃĊmonenschleuder stirbt, scheint die dÃĊmonische Energie hier nachzulassen.
actors.mobs.demonspawner.desc=Diese sich drehende Masse aus Zwergenfleisch produziert Schlitzer-DÃĊmonen aus den gefallenen Zwergen dieses Gebiets. Ganz offensichtlich haben diese DÃĊmonen kein Problem damit, jede nur erdenkliche Ressource gegen ihre Feinde einzusetzen.\n\nObwohl sie furchterregend aussehen, kÃ¶nnen DÃĊmonenschleudern sich weder fortbewegen noch selbst verteidigen. Dabei macht es ihre erhebliche Masse einem aber schwer, sie schnell zu tÃ¶ten, und sie bringen bei Gefahr schneller Schlitzer-DÃĊmonen hervor.\n\n_Die DÃĊmonenschleudern scheinen mit einer zentralen Quelle der DÃĊmonenenergie verbunden zu sein. Sie zu tÃ¶ten, kÃ¶nnte die Quelle schwÃĊchen._

actors.mobs.dm100.name=DM-100
