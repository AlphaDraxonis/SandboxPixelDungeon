actors.mobs.crystalguardian.desc=Diese groÃen, kristallinen WÃĊchter sehen fast wie Statuen aus, wÃĊren da nicht die hell strahlenden Augen. Das verhÃĊrtete Kristall, aus dem sie bestehen, fÃỳhrt dazu, dass sie zwar trÃĊge, aber sehr robust sind, es wÃĊre also besser, _sie so lange wie mÃ¶glich in ihrem Kristallnest schlafen zu lassen._\n\nAufgrund ihrer GrÃ¶Ãe bewegen sich KristallwÃĊchter in eng umschlossenen RÃĊumen sehr viel langsamer. AuÃerdem sind sie so widerstandsfÃĊhig, dass sie nicht endgÃỳltig getÃ¶tet werden kÃ¶nnen. Man kann sie niederschlagen und so fÃỳr eine Zeitlang ausschalten, aber nach einer Weile stehen sie einfach wieder auf.
