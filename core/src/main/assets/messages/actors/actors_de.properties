actors.buffs.snipersmark.action_name_sniper=ScharfschÃỳtzenschuss
actors.buffs.snipersmark.desc=Die ScharfschÃỳtzin ist auf das Ziel konzentriert, das sie zuletzt angegriffen hat. Sie ist in der Lage, mit ihrem Bogen einen speziellen Angriff auszufÃỳhren, der davon abhÃĊngt, wie der Bogen verbessert wurde.\n\nEin nicht ausgerÃỳsteter Bogen wird einen _Schnellschuss_ abfeuern, der weniger Schaden anrichtet, aber keine Zeit zum Abfeuern braucht.\n\nEin Bogen, der hinsichtlich Geschwindigkeit verbessert wurde, kann eine _Salve_ von drei Pfeilen abfeuern. Jeder Pfeil verursacht geringen Schaden, kann aber trotzdem eine Verzauberung bewirken. Das Abfeuern der Salve dauert einen Zug.\n\nEin auf Schaden hin ausgebauter Bogen wird einen _PrÃĊzisionsschuss_ abfeuern. Dieser Schuss ist ein garantierter Treffer, benÃ¶tigt zwei ZÃỳge und verursacht einen Extraschaden, welcher von der Entfernung zum Ziel abhÃĊngt.\n\nVerbleibende ZÃỳge: %s.

