actors.hero.heroclass.warrior=Krieger
actors.hero.heroclass.warrior_desc_short=Der Krieger hÃĊlt zusÃĊtzlichen Schaden aus, wenn sein _gebrochenes Siegel_ ihm Schild gewÃĊhrt. Das Siegel kann von RÃỳstung zu RÃỳstung Ãỳbertragen werden und _ÃỳbertrÃĊgt eine einzelne Verbesserung._
