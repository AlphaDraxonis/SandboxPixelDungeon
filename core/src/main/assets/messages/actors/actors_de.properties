actors.mobs.gnollgeomancer.desc=Dieser beeindruckend groÃe, ÃĊltere Gnoll muss wohl die Quelle der verschiedenen Erdreich bewegenden Magie sein, die hier wirkt, und er ist wohl auch der AnfÃỳhrer der ganzen Gnoll-AktivitÃĊt. Im Unterschied zu den hier rumorenden Gnoll-Pionieren ist der Geomant in seiner Magie gut bewandert, und er kann nicht durch geworfene oder fallende Steine verletzt werden. Dabei hat er aber keinerlei MÃ¶glichkeit fÃỳr den Nahkampf.
actors.mobs.gnollgeomancer.desc_armor=Der Geomant ist derzeit in einer Schicht aus SteinrÃỳstung eingekapselt. _Du musst nahe heran, um sie mit deiner Spitzhacke zu brechen, bevor du dem Geomanten Schaden zufÃỳgen kannst._
actors.mobs.gnollgeomancer.desc_armor_sapper=_Ein Gnoll-Pionier in der NÃĊhe hÃĊlt ein GerÃĊt, das die SteinrÃỳstung des Geomanten mit Energie versorgt. Momentan kannst du sie in keiner Weise beschÃĊdigen!_
actors.mobs.gnollgeomancer.desc_sleeping=Dieser beeindruckend groÃe Gnoll-Schamane ist von einer Steinschicht umgeben und sieht beinahe wie eine Statue aus. Bei genauerem Hinsehen erkennt man, wie die Steine sich auf magische Weise im Einklang mit dem Atem des ÃĊlteren Gnolls bewegen. Solange er auf diese Weise in Stein eingekapselt ist, kann er nicht verletzt werden, und derzeit schlÃĊft er buchstÃĊblich wie ein Stein.\n\nDu kannst mit deiner Spitzhacke vermutlich durch die Steinschichten hacken, aber _mach dich auf einen Kampf gefasst, wenn du das tust._ Der Geomant muss wohl die Quelle der verschiedenen Erdreich bewegenden Magie sein, die hier wirkt, und er ist wohl auch der AnfÃỳhrer der ganzen Gnoll-AktivitÃĊt. _Es wÃĊre keine schlechte Idee, die hier versprengten Gnolle zu besiegen, bevor du ihn angreifst._
