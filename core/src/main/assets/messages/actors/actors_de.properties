actors.mobs.golem.name=Golem
actors.mobs.golem.def_verb=geblockt
actors.mobs.golem.desc=Golems sind ein Versuch, die frÃỳheren Makel an den Zwergenmaschinen durch die neu entdeckte Verwendung von Magie durch die Zwerge zu korrigieren. Sie sind im Vergleich mit dem DM-300 wesentlich kompakter und effizienter, dabei immer noch sehr todbringend.\n\nGolems sind zu groÃ, um durch enge Passagen zu passen, aber die Zwerge haben ihnen zum Ausgleich magische KrÃĊfte verliehen. Golems kÃ¶nnen sich selbst von einem Raum zum anderen teleportieren, und sie kÃ¶nnen Feinde zu sich heranteleportieren, wenn diese auÃer Reichweite sind.

