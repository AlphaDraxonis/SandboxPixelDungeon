actors.mobs.brute.desc=Grobiane sind die grÃ¶Ãten, stÃĊrksten und die zÃĊhsten aller Gnolle. Wenn sie tÃ¶dlich verletzt sind, verfallen sie in Raserei, wodurch sie kurzzeitig einen Schild erhalten und weit mehr Schaden zufÃỳgen.
actors.mobs.brute$bruterage.name=Grobian-Raserei
