actors.hero.heroclass.mage=Magier
actors.hero.heroclass.mage_desc_short=Der Magier ist ein arkaner Meister und trÃĊgt einen _magischen Stab_, der stÃĊrker ist als ein Zauberstab. Der Stab kann _mit jedem beliebigen Zauberstab verschmolzen werden_, den der Zauberer findet.
actors.hero.heroclass.mage_desc=Der Magier startet mit einem _einzigartigen Zauberstab_, der sich deutlich schneller als andere StÃĊbe wieder auflÃĊdt und eine Ladung mehr hat. Der Zauberstab _kann mit jedem Stab verschmolzen werden_, den der Magier im Dungeon findet.\n\nDer Magier startet auÃerdem mit einem _Stab der magischen Geschosse_, welcher mit seinem Zauberstab verschmolzen ist, einer StoffrÃỳstung, einem Wasserschlauch und einem Samtbeutel.\n\nDer Magier identifiziert automatisch:\n_-_ Schriftrollen der Identifizierung\n_-_ Trank der flÃỳssigen Flamme\n_-_ Schriftrolle der Verbesserung
actors.hero.heroclass.mage_unlock=Um den Magier freizuschalten, _benutze eine Schriftrolle der Verbesserung, um einen Gegenstand stÃĊrker zu machen._

actors.hero.heroclass.rogue=Schurke
actors.hero.heroclass.rogue_desc_short=Der Schurke kann Feinden ausweichen und aus der Unsichtbarkeit heraus angreifen, wenn er seinen _Umhang der Schatten_ benutzt. AuÃerdem _entdeckt er Geheimnisse und Fallen_ bereits aus grÃ¶Ãerer Entfernung.
actors.hero.heroclass.rogue_desc=Der Schurke startet mit einem einzigartigen _Umhang der Schatten_, mit dem er sich nach Belieben unsichtbar machen kann.\n\nDer Schurke kann aus groÃer Distanz _Geheimnisse und Fallen orten_.\n\nDer Schurke startet auÃerdem mit _einem Dolch_, _drei Wurfmessern_, einer StoffrÃỳstung, einem Wasserschlauch und einem Samtbeutel.\n\nDer Schurke identifiziert automatisch:\n_-_ Schriftrollen der Identifizierung\n_-_ TrÃĊnke der Unsichtbarkeit\n_-_ Schriftrollen der magischen Kartographie
actors.hero.heroclass.rogue_unlock=Um den Schurken freizuschalten, _fÃỳhre 10 Ãberraschungsangriffe in einem Spiel aus._

actors.hero.heroclass.huntress=JÃĊgerin
actors.hero.heroclass.huntress_desc_short=Die JÃĊgerin ist eine Meisterin der Wurfwaffen und besitzt einen _magischen Bogen_ mit unendlich vielen Pfeilen. AuÃerdem kann sie durch hohes Gras laufen, _ohne es zu zertrampeln._
actors.hero.heroclass.huntress_desc=Die JÃĊgerin startet mit einem _einzigartigen Seelenbogen_, der eine unendliche Anzahl von beschworenen Pfeilen abfeuern kann.\n\nDie JÃĊgerin kann durch hohes Gras laufen, _ohne es zu zertrampeln._\n\nDie JÃĊgerin startet auÃerdem mit _Kampfhandschuhen_, einer StoffrÃỳstung, einem Wasserschlauch und einem Samtbeutel.\n\nDie JÃĊgerin identifiziert automatisch:\n_-_ Schriftrollen der Identifizierung\n_-_ TrÃĊnke der Ãỳbersinnlichen Wahrnehmung\n_-_ Schriftrollen des Wiegenlieds
actors.hero.heroclass.huntress_unlock=Um die JÃĊgerin freizuschalten, _triff 10 mal mit Wurfwaffen gegen Feinde in einem Spiel._

actors.hero.heroclass.duelist=ZweikÃĊmpferin
actors.hero.heroclass.duelist_desc_short=Die ZweikÃĊmpferin ist eine Meisterin der Waffen, sie kann ihre Waffe dazu einsetzen, eine _besondere WaffenfÃĊhigkeit_ aufzurufen. Diese besondere FÃĊhigkeit ist _bei jeder Waffe eine andere._
actors.hero.heroclass.duelist_desc=Die ZweikÃĊmpferin beginnt mit einem _einzigartigen Rapier_, dessen besondere FÃĊhigkeit mit der Zeit wieder aufgeladen wird.\n\nJede Waffe im Spiel hat eine _eigene besondere FÃĊhigkeit_, welche die ZweikÃĊmpferin nutzen kann.\n\nDie ZweikÃĊmpferin beginnt auch mit _zwei WurfspieÃen_, einer StoffrÃỳstung, einem Wasserschlauch und einem Samtbeutel.\n\nDie ZweikÃĊmpferin identifiziert automatisch:\n_-_ Schriftrollen der Identifizierung\n_-_ TrÃĊnke der StÃĊrke\n_-_ Schriftrollen des Spiegelbilds
actors.hero.heroclass.duelist_unlock=Um die ZweikÃĊmpferin freizuschalten, _rÃỳste eine Waffe der Klasse 2 oder hÃ¶her ohne EinbuÃen durch mangelnde StÃĊrke_ aus.

actors.hero.heroclass.cleric=Kleriker
actors.hero.heroclass.cleric_desc_short=Der Kleriker ist ein gÃ¶ttlicher Spruchwirker, der seinen einzigartigen _heiligen Folianten_ einsetzt, um gÃ¶ttliche Magie zu kanalisieren. Er kann mittels der Talente _SprÃỳche lernen und verbessern_.
actors.hero.heroclass.cleric_desc=Der Kleriker startet mit einem _einzigartigen heiligen Folianten_, den er einsetzen kann, um verschiedene SprÃỳche zu wirken.\n\nDie meisten der Talente des Klerikers betreffen das Erlernen neuer oder die Verbesserung bekannter SprÃỳche.\n\nDer Kleriker ist anfangs mit einem _TotschlÃĊger_, einer StoffrÃỳstung, einem Wasserschlauch und einem Samtbeutel ausgerÃỳstet.\n\nDer Kleriker identifiziert automatisch:\n_-_ Schriftrollen der Identifikation\n_-_ TrÃĊnke der Reinheit\n_-_ Schriftrollen des Fluchbrechers
actors.hero.heroclass.cleric_unlock=Um den Kleriker freizuschalten, musst du _den Fluch auf einem beliebigen verfluchten AusrÃỳstungsgegenstand vollstÃĊndig entfernen._

actors.hero.herosubclass.berserker=Berserker
actors.hero.herosubclass.berserker_short_desc=Der  _Berserker_ baut Wut auf, wenn er Schaden erleidet. Wut erhÃ¶ht den von ihm ausgeteilten Schaden und kann bei 100% aktiviert werden, wodurch er einen zusÃĊtzlichen Schild erhÃĊlt.
actors.hero.herosubclass.berserker_desc=Wenn der Berserker physischen Schaden erleidet, wird er wÃỳtend â selbst, wenn dieser Schaden von seiner RÃỳstung abgeblockt wird! Die Wut klingt mit der Zeit ab, bei geringer Gesundheit geschieht dies aber langsamer.\n\nDer Berserker verursacht unter Wut bis zu 50% mehr Schaden. Bei maximaler Wut kann er auch in Rage verfallen, wodurch er eine Menge an Abschirmung erhÃĊlt und die Wut nicht nachlÃĊsst, solange die Abschirmung besteht. Die Abschirmung wÃĊchst mit der Stufe der RÃỳstung des Berserkers und kann massiv erhÃ¶ht sein, wenn er geringe Lebensenergie hat. Nachdem er in Rage verfallen ist, benÃ¶tigt der Berserker etwas Zeit, um sich zu erholen.
actors.hero.herosubclass.gladiator=Gladiator
actors.hero.herosubclass.gladiator_short_desc=Der _Gladiator_ baut eine Kombi auf, wenn er erfolgreiche Attacken durchfÃỳhrt. Er kann die Kombi einsetzen, um einzigartige FÃĊhigkeiten zu nutzen.
actors.hero.herosubclass.gladiator_desc=Der Gladiator erhÃ¶ht seine Kombo jedes mal um einen Punkt, wenn er erfolgreich mit einer Nahkampf- oder Wurfwaffe angreift. Wenn der Gladiator innerhalb von 5 ZÃỳgen (15 ZÃỳge nach einer TÃ¶tung) keinen Treffer landet, wird seine Kombo vollstÃĊndig zurÃỳckgesetzt.\n\nMit steigender Kombo werden verschiedene Kombo-Aktionen mit Treffergarantie ausfÃỳhrbar:\n2er Kombo: Gegner wird zurÃỳckgestoÃen, Kombo bleibt erhalten\n4er Kombo: verursacht Schaden basierend auf der RÃỳstung\n6er Kombo: pariert, Kombo bleibt erhalten\n8er Kombo: schÃĊdigt Ziel und nahe befindliche Gegner\n10er Kombo: greift einmal fÃỳr jede Stufe der Kombo an
actors.hero.herosubclass.battlemage=Kampfmagier
actors.hero.herosubclass.battlemage_short_desc=Der _Kampfmagier_ lÃ¶st Bonuseffekte aus, wenn er seinen Stab als Nahkampfwaffe einsetzt. Diese Effekte basieren auf dem Zauberstab, welcher mit dem Stab des Magiers verbunden ist.
actors.hero.herosubclass.battlemage_desc=Der Kampfmagier erhÃĊlt einen Bonuseffekt, wenn er mit seinem Stab im Nahkampf zuschlÃĊgt, als hÃĊtte sein Stab eine zusÃĊtzliche Verzauberung. Diese Effekte hÃĊngen von dem Zauberstab ab, mit dem der Stab verschmolzen ist; jeder Zauberstab hat dabei seinen eigenen Effekt. ZusÃĊtzlich zu den Zauberstab-Effekten erhÃĊlt der Stab des Kampfmagiers 0,5 Ladungen, wenn er damit zuschlÃĊgt.
actors.hero.herosubclass.warlock=Hexenmeister
actors.hero.herosubclass.warlock_short_desc=Der _Hexenmeister_ hat eine Chance, mit seinen ZauberstÃĊben eine Seelenmarkierung auf Gegner zu setzen. Er heilt sich immer, wenn er markierten Gegnern physischen Schaden zufÃỳgt.
actors.hero.herosubclass.warlock_desc=Der Hexenmeister hat die Chance, Charakteren eine Seelenmarkierung zuzufÃỳgen, wenn er mit einem Zauberstab angreift. Die Chance, eine Seelenmarkierung anzubringen und ihre Dauer erhÃ¶hen sich mit dem Level des Zauberstabs.\n\nWenn ein Feind eine Seelenmarkierung besitzt, heilt der Hexenmeister 2 LP fÃỳr jeweils 5 Schaden, den er ihm zufÃỳgt, jedoch nur mit Angriffen von Nahkampf- oder Wurfwaffen, nicht von ZauberstÃĊben!
actors.hero.herosubclass.assassin=AttentÃĊter
actors.hero.herosubclass.assassin_short_desc=Der _AttentÃĊter_ kann einen tÃ¶dlichen Angriff vorbereiten, wÃĊhrend er unsichtbar ist. Je lÃĊnger er wartet, desto stÃĊrker wird der Angriff.
actors.hero.herosubclass.assassin_desc=Der AttentÃĊter bereitet seinen nÃĊchsten Schlag vor, wenn er unsichtbar wird. Je lÃĊnger er sich vorbereitet, desto mÃĊchtiger wird sein nÃĊchster Angriff. Die Vorbereitung kann bis zu 9 ZÃỳge dauern.\n\nNach der Vorbereitung verursacht der AttentÃĊter bei seinem nÃĊchsten Angriff zusÃĊtzlichen Schaden, kann zu seinem Ziel springen und sogar Gegner, die schwach genug sind, sofort tÃ¶ten.
actors.hero.herosubclass.freerunner=FreilÃĊufer
actors.hero.herosubclass.freerunner_short_desc=Der _FreilÃĊufer_ baut Schwung auf, wenn er lÃĊuft, den er nutzen kann, um das Freilaufen zu starten. Dies gibt ihm fÃỳr eine kurze Zeit einen Bonus auf Geschwindigkeit und Ausweichen.
actors.hero.herosubclass.freerunner_desc=Der _FreilÃĊufer_ baut beim Laufen Schwung auf. Er kann bis zu 10 Schwung aufbauen, nachdem er sich 10 ZÃỳge bewegt hat, aber er verliert diesen schnell, wenn er aufhÃ¶rt, sich zu bewegen. Der FreilÃĊufer kann seinen Schwung 2 ZÃỳge pro Schwung-Punkt nutzen, um das Freilaufen zu starten.\n\nWÃĊhrend des Freilaufens bewegt sich der FreilÃĊufer doppelt so schnell und bekommt einen auf seiner Stufe basierenden Bonus auf Ausweichen. Sobald das Freilaufen vorÃỳber ist, beginnt eine Abklingzeit, bevor wieder Schwung aufgebaut werden kann.
actors.hero.herosubclass.sniper=ScharfschÃỳtzin
actors.hero.herosubclass.sniper_short_desc=Die _ScharfschÃỳtzin_ kann RÃỳstung mit ihren Fernkampfangriffen durchdringen. Nach dem Angriff mit einer Wurfwaffe kann sie mit einem Spezialangriff von ihrem Bogen nachsetzen.
actors.hero.herosubclass.sniper_desc=Die ScharfschÃỳtzin ist eine Meisterin des Fernkampfes; ihre Fernangriffe durchbohren feindliche RÃỳstungen. Wenn sie einen Feind mit Wurfwaffen angreift, platziert sie eine ScharfschÃỳtzen-Markierung auf dem Feind, welche dann einen Spezialangriff mit ihrem Bogen gestattet. Dieser Spezialangriff ist abhÃĊngig von der Verzauberung des Bogens.\n\nEin nicht verzauberter Bogen wird sofort einen Schuss abgeben, allerdings mit reduziertem Schaden. Ein schneller Bogen wird eine Salve aus drei Pfeilen abfeuern, die zwar reduzierten Schaden bewirken, jedoch Verzauberungen auslÃ¶sen kÃ¶nnen und einen Zug dauern. Ein Bogen mit erhÃ¶htem Schaden wird einen ScharfschÃỳtzenpfeil abfeuern, der garantiert trifft und Zusatzschaden verursacht. Dies dauert zwei ZÃỳge.
actors.hero.herosubclass.warden=WÃĊchterin
actors.hero.herosubclass.warden_short_desc=_Die WÃĊchterin_ kann durch hohes Gras sehen und bekommt Bonuseffekte, wenn sie Samen pflanzt und Pflanzen zertrampelt.
actors.hero.herosubclass.warden_desc=Die WÃĊchterin hat eine starke Verbindung zur Natur, die ihr eine Reihe von Bonuseffekten in Bezug auf Gras und Pflanzen gibt. Sie kann durch hohes und gefurchtes Gras sehen, als wÃĊre es ein leeres Feld.\n\nDie WÃĊchterin sorgt dafÃỳr, dass um jeden Samen, den sie wirft oder pflanzt, Gras wÃĊchst; wenn sie Pflanzen zertritt, erhÃĊlt sie Bonuseffekte. Diese Bonuseffekte ersetzen die normalen Pflanzeneffekte, was bedeutet, dass keine Pflanze, auf die die WÃĊchterin tritt, ihr schadet.
actors.hero.herosubclass.champion=Meisterin
actors.hero.herosubclass.champion_short_desc=Die _Meisterin_ kann zwei Waffen fÃỳhren und bekommt mehr Waffenladungen. Ihre normalen Angriffe erfolgen mit der PrimÃĊrwaffe, aber sie kann die Waffen tauschen und die FÃĊhigkeiten beider Waffen einsetzen.
actors.hero.herosubclass.champion_desc=Die Meisterin beherrscht Nahkampfwaffen perfekt und kann zusÃĊtzlich zu ihrer PrimÃĊrwaffe eine zweite Waffe ausrÃỳsten. Ihre normalen Angriffe erfolgen mit der PrimÃĊrwaffe, aber sie kann ihre Waffen augenblicklich tauschen und die FÃĊhigkeit einer der Waffen einsetzen.\n\nSie erhÃĊlt auÃerdem 2 maximale Ladungen der WaffenfÃĊhigkeit mehr und eine um 50% erhÃ¶hte Aufladegeschwindigkeit der WaffenfÃĊhigkeit.
actors.hero.herosubclass.monk=Nonne
actors.hero.herosubclass.monk_short_desc=Die _Nonne_ baut im Kampf Energie auf. Diese Energie kann in einer Reihe von einzigartigen FÃĊhigkeiten eingesetzt werden.
actors.hero.herosubclass.monk_desc=Die Nonne beherrscht die KÃ¶rpertechnik perfekt. Wenn sie Feinde besiegt, gewinnt sie Energie, welche in einer Vielzahl an defensiven und technischen FÃĊhigkeiten eingesetzt werden kann. Diese Energie nimmt mit der Zeit nicht ab, hat aber einen Maximalwert in AbhÃĊngigkeit von der Stufe der Nonne.\n\n1 Energie: schnelle FaustschlÃĊge\n2 Energie: fokussiert aufs Ausweichen gegen den nÃĊchsten Angriff\n3 Energie: augenblicklich im Nahbereich springen\n4 Energie: einen Feind zurÃỳcktreten\n5 Energie: meditieren zum LÃ¶schen des Status und zur Wiederherstellung der Ladungen von ZauberstÃĊben und Artefakten
actors.hero.herosubclass.priest=Priester
actors.hero.herosubclass.priest_short_desc=Der _Priester_ erhÃĊlt neue, weit reichende SprÃỳche und eine verstÃĊrkte Version des Leitlichts.
actors.hero.herosubclass.priest_desc=Der Priester erhÃĊlt eine Vielzahl neuer und verbesserter Zauber mit Fokus auf den Fernkampf und Zusammenarbeit mit magischen GegenstÃĊnden.\n\nDer Priester kann _Leitlicht_ einmal alle 50 ZÃỳge kostenlos wirken, erleuchtet Gegner, die direkt von seinen Zaubern getroffen werden, und kann diesen Erleuchtungs-Effekt durch Angriffe - mit manchen Artefakten, ZauberstÃĊben und VerbÃỳndeten - entladen, um Bonus-Schaden in HÃ¶he seiner Stufe +5 zu verursachen.\n\nDer Priester erlernt auÃerdem den Zauber _Gnadenstrahl_, der die Dunkelheit vertreibt, alle sichtbaren Gegner trifft und diese kurzzeitig betÃĊubt. Dieser Zauber erleuchtet Gegner und erfordert 2 Ladungen.
actors.hero.herosubclass.paladin=Paladin
actors.hero.herosubclass.paladin_short_desc=Der _Paladin_ erhÃĊlt neue Zauber mit kurzer Reichweite und verstÃĊrkte Versionen der heiligen Waffe und der heiligen Wache.
actors.hero.herosubclass.paladin_desc=Der Paladin erhÃĊlt eine Vielzahl neuer und verbesserter Zauber, die den Nahkampf und die Synergie mit Waffen und RÃỳstungen betonen.\n\nDie Zauber _Heilige Waffe_ und _Heiliger Schutz_ des Paladins gewÃĊhren hÃ¶here Boni, Ãỳberschreiben nicht mehr bereits bestehende Verzauberungen und Glyphen und kÃ¶nnen durch das Wirken anderer Zauber verlÃĊngert werden.\n\nDer Paladin erhÃĊlt auÃerdem den Zauber _GÃ¶ttliche Strafgewalt_, der einen garantierten Nahkampftreffer mit Bonusschaden und Verzauberungskraft ermÃ¶glicht.

