actors.mobs.goo.desc=Es ist wenig Ãỳber den Schleim bekannt. Es kann gut sein, dass er nicht mal eine Kreatur ist, sondern eher eine Ansammlung von abscheulichen Substanzen der Kanalisation, die irgendwie intelligent geworden sind. UnabhÃĊngig davon ist es die dunkle Magie die diesem Wesen erlaubt zu existieren\n\nSeine glibbrige Beschaffenheit lieÃ ihn viel dunkle Magie absorbieren, du fÃỳhlst schon eine KÃĊlte nur, weil du hier bist. Wenn der Schleim dich mit seiner Energie angreifen kann, wirst du nicht lange leben.

actors.mobs.greatcrab.name=groÃe Krabbe
actors.mobs.greatcrab.noticed=Die Krabbe verteidigt sich mit ihrer riesigen Scherenklaue.
actors.mobs.greatcrab.def_verb=geblockt
actors.mobs.greatcrab.desc=Diese Krabbe ist riesig, sogar im Vergleich mit anderen Kanalkrabben. Ihre blaue Schale ist von Rissen und Seepocken Ãỳberzogen und weisen auf ein hohes Alter hin. Sie bewegt sich schwerfÃĊllig umher, dabei schafft Sie es eben gerade Ihr Gleichgewicht mit der enormen Scherenklaue zu bewahren. Obwohl diese Krabbe nur eine Scherenklaue hat, gleicht ihre GrÃ¶Ãe das leicht aus. Die Krabbe hÃĊlt die Klaue vor sich, wenn immer sie einen Feind erblickt, damit schÃỳtzt sie sich vor Angriffen hinter einem undurchdringlichen Schutzpanzer. Jedoch kann die Krabbe sich nicht gegen Angriffe verteidigen, die sie nicht kommen sieht oder die von mehreren Gegnern ausgehen.
