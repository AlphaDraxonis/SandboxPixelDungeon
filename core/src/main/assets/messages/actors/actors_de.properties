actors.mobs.yogdzewa.rankings_desc=Von Yog-Dzewa verschlungen
actors.mobs.yogdzewa.desc=Yog-Dzewa ist ein alter Gott; ein groÃes Ungeheuer, dessen Einfluss in die Welten der Sterblichen reicht und sie verschlingt, um sein endloses Wachstum zu nÃĊhren. Die Zwerge mÃỳssen die Aufmerksamkeit dieses kosmischen Grauens erregt haben, als sie mit dunkler Magie experimentierten, und versuchen seitdem, es unter Verschluss zu halten.\n\nYog-Dzewa stammt aus einer Dimension von rohem magischem Chaos und kann seine wahre Form nicht in diese Welt bringen. Stattdessen hat es Avatare erschaffen und dÃĊmonische Lakaien beschworen, die hier seine Befehle ausfÃỳhren.\n\nDieses riesige Auge ist der Brennpunkt von Yog-Dzewas Macht in dieser Welt. WÃĊhrend das Auge selbst unbeweglich ist, ist es in der Lage, mÃĊchtige Strahlen dÃĊmonischer Magie abzufeuern und eine Vielzahl von Lakaien zu beschwÃ¶ren, die ihn unterstÃỳtzen.
actors.mobs.yogdzewa.desc_spawners=Du kannst Wellen dÃĊmonischer Energie spÃỳren, die von den weiter oben liegenden Ebenen zum Auge strÃ¶men. Yog-Dzewa muss diese Energie von Kreaturen, die du dort oben am Leben gelassen hast, beziehen. _Yog wird diese Energie nutzen, um stÃĊrkere Lakaien zu beschwÃ¶ren!_
