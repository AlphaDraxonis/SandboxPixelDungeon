actors.mobs.guard.desc=Einst HÃỳter des unterirdischen GefÃĊngnisses, sind diese WÃĊchter schon lange nicht mehr besser als die Insassen. Sie schleppen sich fort wie Zombies, hirnlos durch die Hallen streifend auf der Suche nach allem, was dort nicht hingehÃ¶rt, so wie du!\n\nSie tragen Ketten um ihre HÃỳfte, mÃ¶glicherweise, um Feinde nah heranzuziehen.

actors.mobs.hermitcrab.name=Einsiedlerkrabbe
