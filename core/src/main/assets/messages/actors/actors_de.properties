actors.hero.talent$lingeringmagictracker.desc=Der Magier hat gerade einen Zauberstab oder Magierstab verwendet, und sein nÃĊchster physischer Angriff wird Zusatzschaden verursachen.\n\nVerbleibende ZÃỳge: %s.
actors.hero.talent$followupstriketracker.name=Anschlusstreffer
actors.hero.talent$followupstriketracker.desc=Nachdem die ZweikÃĊmpferin einen Feind mit einer Wurfwaffe angegriffen hat, verursacht sie bei ihrem nÃĊchsten Nahkampfangriff gegen dasselbe Ziel Bonusschaden.\n\nVerbleibende ZÃỳge: %s.
