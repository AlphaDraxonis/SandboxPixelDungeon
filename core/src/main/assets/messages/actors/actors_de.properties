actors.mobs.npcs.mirrorimage.name=Spiegelbild
actors.mobs.npcs.mirrorimage.desc=Diese Illusion sieht dir sehr ÃĊhnlich, sie scheint sogar deine aktuelle RÃỳstung und Waffe zu tragen.\n\nSpiegelbilder suchen nach Feinden und greifen diese mit ihren imitierten Waffen an, welche sich genauso verhalten wie deine, aber weniger Schaden anrichten. Zuerst sind sie fast unsichtbar, aber um angreifen zu kÃ¶nnen, mÃỳssen Spielbilder eine feste Form annehmen.\n\nObwohl sie viel Schaden austeilen kÃ¶nnen, halten Spiegelbilder nicht lange durch und verblassen, sobald sie getroffen werden.
actors.mobs.npcs.mirrorimage.discover_hint=Du kannst diesen Charakter mit einer bestimmten Schriftrolle finden.

