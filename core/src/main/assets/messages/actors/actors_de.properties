actors.buffs.shadows.desc=Du bist mit den Schatten verschmolzen, was dir Unsichtbarkeit gewÃĊhrt und deinen Stoffwechsel verlangsamt.\n\nWÃĊhrend du unsichtbar bist, kÃ¶nnen Gegner dich weder angreifen noch dir folgen. Die meisten physischen sowie magischen Angriffe (wie Schriftrollen oder StÃĊbe) werden die Unsichtbarkeit sofort beenden. AuÃerdem nimmt dein Hunger langsamer zu, wÃĊhrend du unsichtbar bist.\n\nDein Schattenmantel verbleibt so lange, bis du die Schatten verlÃĊsst oder in Kontakt mit einem Gegner kommst.

actors.buffs.slow.name=verlangsamt
